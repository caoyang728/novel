<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>章节编辑器 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/chapter.css" rel="stylesheet">
</head>
<body>

    <div class="main-content-full">
        <div class="content-header">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-outline-secondary btn-back">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div>
                    <h5>章节编辑器</h5>
                    <span class="badge bg-info text-white" id="project-title">请选择项目</span>
                </div>
            </div>
            <div class="d-flex gap-2 align-items-center select-form">
                <label class="select-label" for="volume-version-select">卷版本</label>
                <select class="form-select" id="volume-version-select" style="width: 180px;">
                    <option value="">请选择卷版本</option>
                </select>
                <label class="select-label" for="volume-select">卷</label>
                <select class="form-select" id="volume-select" style="width: 180px;" disabled>
                    <option value="">请选择卷</option>
                </select>
                <button class="btn btn-gradient-primary generate-chapters-btn" id="generate-chapters-btn" onclick="generateChapterSummaries()" disabled>
                    <i class="fas fa-wand-magic-sparkles"></i>
                    <span>AI 生成章节</span>
                </button>
            </div>
        </div>

        <div class="split-view">
            <!-- 左侧：章节列表 -->
            <div class="chapter-list-panel">
                <div class="panel-header">
                    <div class="d-flex align-items-center justify-content-between">
                        <span><i class="fas fa-book-open me-2"></i>章节列表 <span class="badge bg-secondary text-white" id="total-chapters-count">-章</span></span>
                        <select class="form-select form-select-sm status-filter-select" id="chapter-status-filter" onchange="filterChaptersByStatus()">
                            <option value="">全部</option>
                            <option value="summary">已生成概述</option>
                            <option value="draft">草稿</option>
                            <option value="failed">生成失败</option>
                            <option value="locked">已锁定</option>
                            <option value="published">已发布</option>
                            <option value="archived">已归档</option>
                            <option value="deleted">已删除</option>
                        </select>
                    </div>
                </div>
                <div class="chapter-list" id="chapter-list">
                    <div class="empty-state py-4 px-3 text-center">
                        <i class="fas fa-file-alt text-muted mb-2" style="font-size: 2rem;"></i>
                        <p class="text-muted mb-0" style="font-size: 0.85rem;">请选择卷版本和卷</p>
                    </div>
                </div>
            </div>

            <!-- 右侧：编辑器 -->
            <div class="editor-panel">
                <div class="editor-header">
                    <div class="d-flex align-items-center gap-2">
                        <span class="fw-bold" id="current-chapter-label">请选择章节</span>
                        <i class="fas fa-pen-to-square chapter-title-edit-icon" id="chapter-title-edit-icon" onclick="startEditTitle()" style="display:none; cursor:pointer; color:#818cf8; font-size:0.8rem;" title="编辑标题"></i>
                        <input type="text" class="form-control chapter-title-inline-input" id="chapter-title-input" style="display:none;" placeholder="输入章节标题">
                        <button class="btn btn-sm chapter-title-save-btn" id="chapter-title-save-btn" onclick="finishEditTitle()" style="display:none;"><i class="fas fa-check"></i></button>
                    </div>
                    <div class="btn-toolbar">
                        <!-- 未锁定时显示的修改按钮 -->
                        <button class="btn btn-verify btn-modify" id="btn-verify" onclick="verifyChapter()" disabled>
                            <i class="fas fa-check-double"></i> 校验
                        </button>
                        <button class="btn btn-warning-action btn-modify" id="btn-split" onclick="splitChapter()" disabled>
                            <i class="fas fa-cut"></i> 拆分
                        </button>
                        <!-- 保存/取消：仅手动修改后显示 -->
                        <button class="btn btn-save" id="btn-save" onclick="saveChapter()" style="display:none;">
                            <i class="fas fa-save"></i> 保存
                        </button>
                        <button class="btn btn-cancel" id="btn-cancel" onclick="cancelEdit()" style="display:none;">
                            <i class="fas fa-times"></i> 取消
                        </button>
                        <!-- 锁定后才显示发布 -->
                        <button class="btn btn-publish" id="btn-publish" onclick="publishChapter()" style="display:none;">
                            <i class="fas fa-rocket"></i> 发布
                        </button>
                        <button class="btn btn-lock" id="btn-lock" onclick="toggleLock()" disabled>
                            <i class="fas fa-lock-open"></i> <span>锁定</span>
                        </button>
                        <button class="btn btn-delete" id="btn-delete" onclick="deleteChapter()" disabled>
                            <i class="fas fa-trash-alt"></i> 删除
                        </button>
                    </div>
                </div>
                <div class="editor-body">
                    <!-- 未选择章节时的占位 -->
                    <div class="editor-empty-state" id="editor-empty-state">
                        <i class="fas fa-feather-pointed"></i>
                        <p class="editor-empty-title">选择一个章节开始创作</p>
                        <p class="editor-empty-hint">从左侧章节列表中选择章节，或点击「AI 生成章节」创建新内容</p>
                    </div>
                    <!-- 编辑器内容区 -->
                    <div class="editor-content-area" id="editor-content-area" style="display:none;">
                    <div class="editor-form-group flex-grow-1 d-flex flex-column">
                        <div class="content-tabs">
                            <button class="content-tab active" id="tab-content" onclick="switchEditorTab('content')">章节内容</button>
                            <button class="content-tab" id="tab-summary" onclick="switchEditorTab('summary')">章节概述</button>
                        </div>
                        <div class="editor-content-wrapper" id="editor-content-wrapper">
                            <textarea class="form-control editor-textarea" id="chapter-content-input" placeholder="开始创作..."></textarea>
                            <div class="empty-content-placeholder" id="empty-content-placeholder" style="display:none;">
                                <i class="fas fa-file-lines"></i>
                                <p>暂无章节内容</p>
                                <button class="btn btn-gradient-primary" id="btn-generate-single" onclick="generateSingleChapterContent()">
                                    <i class="fas fa-wand-magic-sparkles"></i> AI 生成
                                </button>
                                <!-- 已删除章节操作按钮 -->
                                <div id="deleted-chapter-actions" style="display:none; gap: 0.75rem; align-items: center;">
                                    <button class="btn-restore" onclick="restoreChapter()">
                                        <i class="fas fa-rotate-left"></i> 恢复
                                    </button>
                                    <button class="btn-hard-delete" onclick="showHardDeleteModal()">
                                        <i class="fas fa-trash-alt"></i> 彻底删除
                                    </button>
                                </div>
                            </div>
                        </div>
                        <textarea class="form-control editor-textarea" id="chapter-summary-input" placeholder="输入章节概述..." style="display:none;"></textarea>
                    </div>

                    <!-- AI对话面板 -->
                    <div class="ai-chat-panel" id="ai-chat-panel">
                        <div class="quick-prompts" id="quick-prompts">
                            <button class="quick-prompt-btn" onclick="insertPrompt('继续写下去，保持风格一致')">继续写</button>
                            <button class="quick-prompt-btn" onclick="insertPrompt('补充更多细节描写')">补充细节</button>
                            <button class="quick-prompt-btn" onclick="insertPrompt('增加人物对话')">增加对话</button>
                            <button class="quick-prompt-btn" onclick="insertPrompt('加强情感描写')">情感描写</button>
                            <button class="quick-prompt-btn" onclick="insertPrompt('过渡到下一场景')">场景过渡</button>
                        </div>
                        <div class="ai-chat-messages" id="ai-chat-messages"></div>
                        <div class="ai-input-row">
                            <textarea id="ai-chat-input" rows="2" placeholder="输入指令让AI帮你写作... (Enter发送, Shift+Enter换行)"></textarea>
                            <button class="btn-ai-send" id="btn-ai-send" onclick="sendAiMessage()">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 校验结果模态框（check-modal 风格） -->
    <div class="modal-overlay" id="verify-modal">
        <div class="modal-content check-modal">
            <div class="modal-header">
                <h5><i class="fas fa-clipboard-check me-2"></i> 章节校验结果</h5>
                <button class="btn-close" onclick="closeVerifyModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="verify-result-body">
                <div class="check-intro" id="verify-intro">
                    <p>AI 已完成章节校验，以下是发现的问题：</p>
                </div>
                <div class="check-issues-container" id="verify-result">
                </div>
                <div class="check-empty" id="verify-empty" style="display: none;">
                    <i class="fa-solid fa-circle-check"></i>
                    <p>校验完成，未发现问题</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary" onclick="closeVerifyModal()">关闭</button>
                <button class="btn btn-gradient-primary" id="btn-verify-fix" onclick="fixVerifyIssues()" style="display: none;">
                    <i class="fas fa-wand-magic-sparkles"></i> AI修复选中的问题
                </button>
            </div>
        </div>
    </div>

    <!-- 确认操作模态框 -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5 id="confirm-title">确认</h5>
                <button class="btn-close" onclick="closeModal('confirm-modal')"></button>
            </div>
            <div class="modal-body">
                <p id="confirm-message">确定执行此操作？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary" onclick="closeModal('confirm-modal')">取消</button>
                <button class="btn btn-gradient-primary" id="confirm-btn" onclick="executeConfirm()">确认</button>
            </div>
        </div>
    </div>

    <!-- 拆分章节模态框 -->
    <div class="modal-overlay" id="split-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5><i class="fas fa-cut me-2"></i> 拆分章节</h5>
                <button class="btn-close" onclick="closeModal('split-modal')"></button>
            </div>
            <div class="modal-body">
                <div class="split-options">
                    <div class="split-option-group">
                        <label>拆分模式</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="split-mode" value="by_word_count" onchange="updateSplitDesc()">
                                按字数拆分
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="split-mode" value="by_plot" onchange="updateSplitDesc()">
                                按剧情拆分
                            </label>
                        </div>
                        <div class="split-desc" id="split-mode-desc">请选择拆分模式</div>
                    </div>
                    <div class="split-option-group">
                        <label>内容处理</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="content-handling" value="insert_next" onchange="updateSplitDesc()">
                                插入下一章
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="content-handling" value="create_new" onchange="updateSplitDesc()">
                                新建一章
                            </label>
                        </div>
                        <div class="split-desc" id="split-handling-desc">请选择内容处理方式</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary" onclick="closeModal('split-modal')">取消</button>
                <button class="btn btn-gradient-primary" onclick="executeSplit()">确认拆分</button>
            </div>
        </div>
    </div>

    <!-- 彻底删除确认模态框 -->
    <div class="modal-overlay" id="hard-delete-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5><i class="fas fa-exclamation-triangle me-2" style="color:#f87171;"></i> 彻底删除章节</h5>
                <button class="btn-close" onclick="closeModal('hard-delete-modal')"></button>
            </div>
            <div class="modal-body">
                <p id="hard-delete-message" style="color:#f87171; font-weight:500;"></p>
                <input type="text" class="hard-delete-input" id="hard-delete-input" placeholder="请输入章节名确认删除" oninput="checkHardDeleteInput()">
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary" onclick="closeModal('hard-delete-modal')">取消</button>
                <button class="btn btn-hard-delete" id="hard-delete-confirm-btn" onclick="executeHardDelete()" disabled>彻底删除</button>
            </div>
        </div>
    </div>

    <!-- 删除后调整序号提示模态框 -->
    <div class="modal-overlay" id="reorder-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5><i class="fas fa-sort-numeric-down me-2"></i> 调整章节序号</h5>
                <button class="btn-close" onclick="closeModal('reorder-modal')"></button>
            </div>
            <div class="modal-body">
                <p>章节已删除，章节序号是否需要整体调整，以免缺少章节？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary" onclick="closeModal('reorder-modal')">取消</button>
                <button class="btn btn-gradient-primary" onclick="executeReorder()">调整序号</button>
            </div>
        </div>
    </div>

    <!-- 相邻已删除章节警告模态框 -->
    <div class="modal-overlay" id="deleted-warning-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5><i class="fas fa-exclamation-triangle me-2" style="color:#fbbf24;"></i> 提示</h5>
                <button class="btn-close" onclick="closeModal('deleted-warning-modal')"></button>
            </div>
            <div class="modal-body">
                <div id="deleted-warning-messages"></div>
            </div>
            <div class="modal-footer-three">
                <button class="btn btn-outline-secondary" onclick="closeModal('deleted-warning-modal')">取消</button>
                <button class="btn btn-gradient-primary" id="deleted-warning-go-restore-btn">去恢复</button>
                <button class="btn btn-gradient-primary" id="deleted-warning-confirm-btn">确认</button>
            </div>
        </div>
    </div>

    <!-- AI对话对比结果弹窗 -->
    <div class="modal-overlay" id="chat-compare-modal">
        <div class="modal-content modal-compare">
            <div class="modal-header py-2">
                <h6 class="mb-0"><i class="fas fa-code-compare me-2"></i> AI 修改对比 <span class="compare-status-badge ms-2" id="compare-status-badge">已修改 0 章</span></h6>
                <button class="btn-close" onclick="closeCompareModal()"></button>
            </div>
            <div class="modal-body p-0" style="overflow: hidden;">
                <div class="compare-layout">
                    <!-- 左侧：章节列表 -->
                    <div class="compare-chapter-list" id="compare-chapter-list">
                        <div class="compare-chapter-list-header">修改章节</div>
                        <div class="compare-chapter-list-body" id="compare-chapter-list-body"></div>
                    </div>
                    <!-- 中间：修改前后对比（左右并排） -->
                    <div class="compare-content">
                        <div class="compare-content-header">
                            <span class="compare-chapter-label" id="compare-chapter-label">
                                <span class="title-original" id="compare-title-original">第1章: 原标题</span>
                                <span class="title-arrow" id="compare-title-arrow">→</span>
                                <span class="title-modified" id="compare-title-modified">第1章: 新标题</span>
                            </span>
                        </div>
                        <div class="compare-content-body">
                            <div class="compare-rows" id="compare-rows">
                                <div class="compare-rows-placeholder">选择章节查看对比</div>
                            </div>
                        </div>
                    </div>
                    <!-- 右侧：AI对话 -->
                    <div class="compare-chat">
                        <div class="compare-chat-header">
                            <i class="fas fa-robot me-1" style="color: #818cf8;"></i> AI 对话
                        </div>
                        <div class="compare-chat-messages" id="compare-chat-messages"></div>
                        <div class="compare-chat-input-row">
                            <textarea id="compare-chat-input" rows="2" placeholder="继续输入指令... (Enter发送, Shift+Enter换行)"></textarea>
                            <button class="btn-ai-send" id="btn-compare-chat-send" onclick="sendCompareChatMessage()">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer compare-modal-footer">
                <button class="btn btn-sm btn-outline-secondary" onclick="cancelCompareChanges()">
                    <i class="fas fa-times"></i> 取消修改
                </button>
                <button class="btn btn-sm btn-gradient-primary" id="btn-compare-save" onclick="saveCompareChanges()">
                    <i class="fas fa-save"></i> 保存修改
                </button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/chapter.js"></script>
</body>
</html>
