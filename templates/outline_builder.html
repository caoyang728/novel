<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大纲构建 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --success: #22c55e;
            --danger: #ef4444;
        }
        body {
            background: #f0f4f8;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d0d5dd;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b0b5bd;
        }
        .main-content-full {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .content-header {
            padding: 0.5rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .content-header h5 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
        }
        .badge-info {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.12) 0%, rgba(56, 189, 248, 0.12) 100%);
            color: var(--primary);
            border: none;
        }
        .btn-gradient {
            border: none;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            cursor: pointer;
        }
        .btn-gradient:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .btn-gradient-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }
        .btn-gradient-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
        .btn-gradient-success {
            background: linear-gradient(135deg, var(--success) 0%, #16a34a 100%);
            color: white;
        }
        .btn-gradient-success:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }
        .btn-outline-gradient {
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            cursor: pointer;
        }
        .btn-outline-gradient:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-outline-success {
            border: 1.5px solid var(--success);
            color: var(--success);
            background: transparent;
        }
        .btn-outline-success:hover:not(:disabled) {
            background: rgba(34, 197, 94, 0.08);
        }
        .btn-outline-secondary {
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        .split-view {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar-panel {
            width: 260px;
            background: white;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            margin: 0 0 1rem 1rem;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: box-shadow 0.25s ease;
        }
        .sidebar-panel:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .sidebar-section-header {
            padding: 0.875rem 1rem;
            background: #e2e8f0;
            font-weight: 600;
            font-size: 0.875rem;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #475569;
        }
        .version-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.625rem;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }
        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.6;
        }
        .empty-state p {
            font-size: 0.85rem;
            margin: 0;
        }
        .version-item {
            padding: 0.75rem;
            border-radius: 10px;
            margin-bottom: 0.375rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .version-item:hover {
            background: #f8fafc;
            border-color: #edf2f7;
        }
        .version-item.active {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.08) 0%, rgba(56, 189, 248, 0.06) 100%);
            border-color: rgba(14, 165, 233, 0.2);
        }
        .version-item.active .version-number {
            color: var(--primary);
        }
        .version-item-content {
            flex: 1;
            min-width: 0;
        }
        .version-item .version-number {
            font-weight: 600;
            font-size: 0.875rem;
        }
        .version-item .version-meta {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 0.125rem;
        }
        .version-item-actions {
            display: flex;
            gap: 0.25rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .version-item:hover .version-item-actions {
            opacity: 1;
        }
        .btn-icon {
            width: 28px;
            height: 28px;
            padding: 0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }
        .btn-icon.delete {
            color: var(--danger);
            border-color: var(--danger);
        }
        .btn-icon.delete:hover {
            background: rgba(239, 68, 68, 0.1);
        }
        .middle-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin: 0 1rem 1rem 1rem;    
            overflow: hidden;
        }
        .right-panel {
            width: 35%;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            margin: 0 1rem 1rem 0;
            overflow: hidden;
        }
        .outline-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
            transition: box-shadow 0.25s ease;
        }
        .outline-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .outline-card-header {
            padding: 0.875rem 1rem;
            background: #e2e8f0;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            align-items: center;
        }
        .outline-card-header h5 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
        }
        .outline-card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #outline-content {
            flex: 1;
            width: 100%;
            border: none;
            resize: none;
            padding: 1.25rem;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap;
        }
        #outline-content:focus {
            outline: none;
        }
        #outline-content::placeholder {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        #outline-preview {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            line-height: 1.7;
        }
        .outline-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #94a3b8;
        }
        .outline-empty i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        .outline-empty p {
            font-size: 0.9rem;
            margin: 0;
        }
        .chat-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
            transition: box-shadow 0.25s ease;
        }
        .chat-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .chat-card-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem 0.875rem;
            background: #fafafa;
        }
        .chat-card-footer {
            padding: 0.75rem;
            border-top: 1px solid #e2e8f0;
            background: white;
        }
        .chat-input-wrap {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }
        .chat-input-wrap textarea {
            flex: 1;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 0.625rem 0.875rem;
            font-size: 0.875rem;
            resize: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-height: 44px;
            max-height: 160px;
        }
        .chat-input-wrap textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.12);
        }
        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(14, 165, 233, 0.35);
        }
        .btn-send:active {
            transform: translateY(0);
        }
        .chat-message {
            display: flex;
            margin-bottom: 0.625rem;
        }
        .chat-message.user {
            justify-content: flex-end;
        }
        .chat-message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .avatar-me {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }
        .avatar-ai {
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.12) 0%, rgba(56, 189, 248, 0.12) 100%);
            color: var(--primary);
        }
        .chat-bubble {
            max-width: 85%;
            padding: 0.875rem 1.125rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .chat-bubble-user {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .chat-bubble-assistant {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            color: #334155;
            border-bottom-left-radius: 4px;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 90%;
            max-width: 420px;
            overflow: hidden;
            animation: modalFadeIn 0.2s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h5 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
        }
        .modal-body {
            padding: 1.25rem;
        }
        .modal-body p {
            margin: 0;
            color: #64748b;
        }
        .modal-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        .modal-footer .btn {
            padding: 0.5rem 1.25rem;
            border-radius: 10px;
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast-item {
            background: white;
            color: #1e293b;
            padding: 0.875rem 1.25rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            animation: toastSlideIn 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 280px;
        }
        .toast-item.toast-success {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }
        .toast-item.toast-error {
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
            color: white;
        }
        @keyframes toastSlideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes toastSlideOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100%); }
        }
        .form-select-sm {
            border-radius: 10px;
            border-color: #e2e8f0;
            font-size: 0.875rem;
        }
        .form-select-sm:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }
        .btn-group-custom {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .btn-group-toggle .btn {
            border-radius: 6px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            transition: all 0.2s;
            line-height: 1.2;
        }
        .btn-group-toggle .btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .btn-group-toggle .btn:not(.active):hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .badge-secondary {
            background: linear-gradient(135deg, rgba(100, 116, 139, 0.12) 0%, rgba(148, 163, 184, 0.12) 100%);
            color: #64748b;
            border: none;
        }
        .badge-success {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.12) 0%, rgba(22, 163, 74, 0.12) 100%);
            color: var(--success);
            border: none;
        }
    </style>
</head>
<body>
    <div class="main-content-full">
        <div class="content-header">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-outline-secondary" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div>
                    <h5 class="mb-0">大纲构建</h5>
                    <span class="badge badge-info" id="project-title">-</span>
                </div>
            </div>
            <div class="btn-group-custom">
                <select class="form-select form-select-sm" id="version-select" style="width: 180px;">
                    <option value="">选择版本...</option>
                </select>
                <button class="btn btn-gradient-success" onclick="saveVersion(false)" id="save-btn" disabled>
                    <i class="fas fa-save"></i> 保存当前
                </button>
                <button class="btn btn-gradient-primary" onclick="saveVersion(true)" id="save-as-btn" disabled>
                    <i class="fas fa-file-plus"></i> 另存新版
                </button>
                <button class="btn btn-outline-gradient btn-outline-success" onclick="confirmFinalize()" id="finalize-btn" disabled>
                    <i class="fas fa-check-circle"></i> 定稿
                </button>
            </div>
        </div>

        <div class="split-view">
            <div class="sidebar-panel">
                <div class="sidebar-section-header">
                    <i class="fas fa-layer-group"></i>
                    <span>大纲版本</span>
                </div>
                <div class="version-list" id="outline-versions">
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>暂无大纲版本</p>
                    </div>
                </div>
            </div>

            <div class="middle-panel">
                <div class="outline-card">
                    <div class="outline-card-header d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2">
                            <h5><i class="fas fa-edit me-2"></i>大纲内容</h5>
                            <span class="badge badge-secondary text-sm" id="outline-version">-</span>
                        </div>
                        <div class="btn-group-toggle d-flex gap-1">
                            <button class="btn" id="btn-edit" onclick="showEditMode()">编辑</button>
                            <button class="btn active" id="btn-preview" onclick="showPreviewMode()">预览</button>
                        </div>
                    </div>
                    <div class="outline-card-body">
                        <textarea id="outline-content" class="d-none" placeholder="在此输入您的小说构思，AI将为您构建大纲..."></textarea>
                        <div id="outline-preview" class="markdown-content"></div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="chat-card">
                    <div class="outline-card-header">
                        <h5><i class="fas fa-robot me-2"></i>AI助手</h5>
                    </div>
                    <div class="chat-card-body" id="chat-messages">
                        <div class="chat-message assistant">
                            <div class="chat-message-avatar avatar-ai me-2">AI</div>
                            <div class="chat-bubble chat-bubble-assistant">
                                您好！我是您的大纲助手，可以为您提供大纲的生成和优化服务。
                            </div>
                        </div>
                    </div>
                    <div class="chat-card-footer">
                        <div class="chat-input-wrap">
                            <textarea id="chat-input" rows="3" placeholder="输入您的修改意见...（Shift+Enter 换行，Enter 发送）"></textarea>
                            <button class="btn-send" id="send-message">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5 id="modal-title">确认操作</h5>
                <button class="btn btn-close" onclick="closeModal()"></button>
            </div>
            <div class="modal-body">
                <p id="modal-message">确定要执行此操作吗？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-gradient-primary" id="modal-confirm-btn" onclick="executeModalAction()">确认</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        let projectId = null;
        let messages = [];
        let modalAction = null;
        let currentVersionId = null;

        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            const params = new URLSearchParams(window.location.search);
            projectId = params.get('project_id');
            currentVersionId = params.get('version_id');
            
            if (projectId) {
                loadProjectInfo();
                loadOutlineVersions();
            }

            document.getElementById('outline-content').addEventListener('input', function() {
                updateButtons();
            });

            document.getElementById('send-message').addEventListener('click', sendMessage);
            document.getElementById('chat-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            const chatInput = document.getElementById('chat-input');
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 160) + 'px';
            });

            const versionSelect = document.getElementById('version-select');
            let ignoreNextBlur = false;
            
            versionSelect.addEventListener('focus', function() {
                Array.from(this.options).forEach(option => {
                    if (option.dataset.originalText) {
                        option.text = option.dataset.originalText;
                    }
                });
            });
            
            versionSelect.addEventListener('change', function() {
                const versionId = this.value;
                if (versionId) {
                    loadOutlineVersion(versionId);
                    ignoreNextBlur = true;
                }
            });
            
            versionSelect.addEventListener('blur', function() {
                if (ignoreNextBlur) {
                    ignoreNextBlur = false;
                    return;
                }
                const selectedOption = this.options[this.selectedIndex];
                if (selectedOption && selectedOption.dataset.originalText) {
                    selectedOption.text = `当前版本 ${selectedOption.dataset.originalText}`;
                }
            });
        });

        async function checkAuth() {
            try {
                const response = await fetch('/api/auth/user/', {
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await response.json();
                if (!data.success) {
                    window.location.href = 'login.html';
                }
            } catch (error) {
                window.location.href = 'login.html';
            }
        }

        async function loadProjectInfo() {
            try {
                const response = await fetch(`/api/projects/${projectId}/`, {
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('project-title').textContent = data.project.title;
                }
            } catch (error) {
                console.error('Failed to load project:', error);
            }
        }

        async function loadOutlineVersions() {
            try {
                const response = await fetch(`/api/projects/${projectId}/outline/versions/`, {
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await response.json();
                if (data.success) {
                    renderOutlineVersions(data.versions);
                    
                    const select = document.getElementById('version-select');
                    select.innerHTML = '<option value="">选择版本...</option>';
                    
                    let finalizedVersion = null;
                    let latestVersion = null;
                    
                    data.versions.forEach(version => {
                        const option = document.createElement('option');
                        option.value = version.id;
                        const text = `v${version.version_number}${version.is_finalized ? ' (定稿)' : ''}`;
                        option.textContent = text;
                        option.dataset.originalText = text;
                        select.appendChild(option);
                        
                        if (version.is_finalized) {
                            finalizedVersion = version;
                        }
                        if (!latestVersion || version.version_number > latestVersion.version_number) {
                            latestVersion = version;
                        }
                    });
                    
                    if (currentVersionId) {
                        select.value = currentVersionId;
                        const option = select.querySelector(`option[value="${currentVersionId}"]`);
                        if (option) {
                            option.text = `当前版本 ${option.dataset.originalText}`;
                        }
                        loadOutlineVersion(currentVersionId);
                    } else if (finalizedVersion) {
                        select.value = finalizedVersion.id;
                        const option = select.querySelector(`option[value="${finalizedVersion.id}"]`);
                        if (option) {
                            option.text = `当前版本 ${option.dataset.originalText}`;
                        }
                        loadOutlineVersion(finalizedVersion.id);
                    } else if (latestVersion) {
                        select.value = latestVersion.id;
                        const option = select.querySelector(`option[value="${latestVersion.id}"]`);
                        if (option) {
                            option.text = `当前版本 ${option.dataset.originalText}`;
                        }
                        loadOutlineVersion(latestVersion.id);
                    }
                }
            } catch (error) {
                console.error('Failed to load outline versions:', error);
            }
        }

        function renderOutlineVersions(versions) {
            const container = document.getElementById('outline-versions');
            if (!versions || versions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>暂无大纲版本</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = versions.map(v => `
                <div class="version-item ${currentVersionId === v.id ? 'active' : ''}" onclick="loadOutlineVersion(${v.id})" data-version-id="${v.id}">
                    <div class="version-item-content">
                        <div class="version-number">
                            v${v.version_number}
                            ${v.is_finalized ? '<span class="badge badge-success ms-1" style="font-size: 0.65rem;">定稿</span>' : ''}
                        </div>
                        <div class="version-meta">
                            ${v.created_at ? v.created_at : ''}
                        </div>
                    </div>
                    <div class="version-item-actions">${v.is_finalized ? '' : `<button class="btn btn-outline-danger btn-icon delete" onclick="event.stopPropagation(); deleteOutlineVersion(${v.id})" title="删除版本"><i class="fas fa-trash"></i></button>`}
                    </div>
                </div>
            `).join('');
        }

        async function loadLatestOutline() {
            try {
                const response = await fetch(`/api/projects/${projectId}/outline/latest/`, {
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await response.json();
                if (data.success && data.outline) {
                    document.getElementById('outline-content').value = data.outline.content;
                    document.getElementById('outline-preview').innerHTML = marked.parse(data.outline.content || '');
                    if (data.outline.version_number !== undefined) {
                        document.getElementById('outline-version').textContent = `v${data.outline.version_number}`;
                    }
                    updateButtons();
                } else {
                    document.getElementById('outline-preview').innerHTML = '<div class="outline-empty"><i class="fas fa-file-text"></i><p>暂无大纲内容</p></div>';
                }
            } catch (error) {
                console.error('Failed to load latest outline:', error);
            }
        }

        async function loadOutlineVersion(versionId) {
            currentVersionId = versionId;
            
            document.querySelectorAll('.version-item').forEach(item => {
                item.classList.remove('active');
                if (parseInt(item.dataset.versionId) === versionId) {
                    item.classList.add('active');
                }
            });
            
            try {
                const response = await fetch(`/api/outline/version/${versionId}/`, {
                    headers: { 'X-CSRFToken': getCookie('csrftoken') }
                });
                const data = await response.json();
                console.log('Loaded outline version:', data);
                
                if (data.success) {
                    const content = data.content || '';
                    
                    document.getElementById('outline-content').value = content;
                    document.getElementById('outline-preview').innerHTML = content ? marked.parse(content) : '<div class="outline-empty"><i class="fas fa-file-text"></i><p>暂无大纲内容</p></div>';
                    
                    if (data.version_number !== undefined) {
                        document.getElementById('outline-version').textContent = `v${data.version_number}`;
                    }
                    
                    const select = document.getElementById('version-select');
                    const selectedOption = select.querySelector(`option[value="${versionId}"]`);
                    if (selectedOption) {
                        select.options[select.selectedIndex].text = `当前版本 v${data.version_number}${data.is_finalized ? ' (定稿)' : ''}`;
                    }
                    
                    updateButtons();
                } else {
                    document.getElementById('outline-preview').innerHTML = '<div class="outline-empty"><i class="fas fa-file-text"></i><p>暂无大纲内容</p></div>';
                }
            } catch (error) {
                console.error('Failed to load outline version:', error);
            }
        }

        function updateButtons() {
            const content = document.getElementById('outline-content').value;
            const hasContent = content.trim() !== '';
            document.getElementById('save-btn').disabled = !hasContent;
            document.getElementById('save-as-btn').disabled = !hasContent;
            document.getElementById('finalize-btn').disabled = !hasContent;
        }

        function showEditMode() {
            document.getElementById('outline-content').classList.remove('d-none');
            document.getElementById('outline-preview').classList.add('d-none');
            document.getElementById('btn-edit').classList.add('active');
            document.getElementById('btn-preview').classList.remove('active');
        }

        function showPreviewMode() {
            const content = document.getElementById('outline-content').value;
            document.getElementById('outline-preview').innerHTML = marked.parse(content || '');
            document.getElementById('outline-content').classList.add('d-none');
            document.getElementById('outline-preview').classList.remove('d-none');
            document.getElementById('btn-preview').classList.add('active');
            document.getElementById('btn-edit').classList.remove('active');
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            input.disabled = true;
            document.getElementById('send-message').disabled = true;

            const chatMessages = document.getElementById('chat-messages');
            const userDiv = document.createElement('div');
            userDiv.className = 'chat-message user';
            userDiv.innerHTML = `
                <div class="chat-bubble chat-bubble-user">${escapeHtml(message)}</div>
                <div class="chat-message-avatar avatar-me ms-2">我</div>
            `;
            chatMessages.appendChild(userDiv);

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'chat-message assistant';
            loadingDiv.innerHTML = `
                <div class="chat-message-avatar avatar-ai me-2">AI</div>
                <div class="chat-bubble chat-bubble-assistant">
                    <i class="fas fa-spinner fa-spin"></i> 思考中...
                </div>
            `;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            messages.push({ role: 'user', content: message });
            input.value = '';
            input.style.height = 'auto';

            try {
                const response = await fetch('/api/chat/outline/stream/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: `project_id=${projectId}&message=${encodeURIComponent(message)}&current_outline=${encodeURIComponent(document.getElementById('outline-content').value)}&messages=${encodeURIComponent(JSON.stringify(messages))}`
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let result = '';
                let responseDiv = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                result += data.chunk;

                                if (!responseDiv) {
                                    responseDiv = document.createElement('div');
                                    responseDiv.className = 'chat-message assistant';
                                    chatMessages.appendChild(responseDiv);
                                    loadingDiv.remove();
                                }

                                responseDiv.innerHTML = `
                                    <div class="chat-message-avatar avatar-ai me-2">AI</div>
                                    <div class="chat-bubble chat-bubble-assistant">${escapeHtml(result)}</div>
                                `;
                                chatMessages.scrollTop = chatMessages.scrollHeight;

                                document.getElementById('outline-content').value = result;
                                updateButtons();
                            } catch (e) {}
                        }
                    }
                }

                messages.push({ role: 'assistant', content: result });

                if (!document.getElementById('outline-preview').classList.contains('d-none')) {
                    document.getElementById('outline-preview').innerHTML = marked.parse(result || '');
                }

            } catch (error) {
                console.error('Error:', error);
            }

            input.disabled = false;
            document.getElementById('send-message').disabled = false;
        }

        function saveVersion(isNewVersion) {
            const content = document.getElementById('outline-content').value;
            if (!content.trim()) {
                showToast('请先输入大纲内容', 'error');
                return;
            }
            
            const label = isNewVersion ? '另存新版本' : '保存当前版本';
            const msg = isNewVersion 
                ? '将当前内容保存为新的版本，现有版本不受影响。' 
                : '将覆盖当前版本的内容。';
            
            showModal(label, msg, function() {
                doSaveVersion(isNewVersion);
            });
        }

        async function doSaveVersion(isNewVersion) {
            const content = document.getElementById('outline-content').value;
            
            try {
                const response = await fetch('/api/outline/version/save/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: `project_id=${projectId}&content=${encodeURIComponent(content)}&messages=${encodeURIComponent(JSON.stringify(messages))}` + (isNewVersion ? '&new_version=true' : '')
                });
                
                const data = await response.json();
                if (data.success) {
                    closeModal();
                    showToast(`保存成功！版本号：v${data.version_number}`, 'success');
                    loadOutlineVersions();
                } else {
                    closeModal();
                    showToast(data.message || '保存失败', 'error');
                }
            } catch (error) {
                closeModal();
                showToast('网络错误，请重试', 'error');
            }
        }

        function confirmFinalize() {
            showModal('定稿版本', '确定要定稿这个大纲吗？定稿后可以继续创建新版本，但此版本将被锁定，且之前的定稿版本将被取消。', function() {
                finalizeOutline();
            });
        }

        async function finalizeOutline() {
            try {
                const response = await fetch('/api/outline/finalize/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: `project_id=${projectId}${currentVersionId ? `&version_id=${currentVersionId}` : ''}`
                });
                
                const data = await response.json();
                if (data.success) {
                    closeModal();
                    showToast('定稿成功！', 'success');
                    loadOutlineVersions();
                } else {
                    closeModal();
                    showToast(data.message || '定稿失败', 'error');
                }
            } catch (error) {
                closeModal();
                showToast('网络错误，请重试', 'error');
            }
        }

        function deleteOutlineVersion(versionId) {
            const versionNum = document.querySelector(`.version-item[data-version-id="${versionId}"] .version-number`)?.textContent?.trim() || '此版本';
            showModal('删除版本', `确定要删除 ${versionNum} 吗？此操作不可恢复。`, function() {
                doDeleteOutlineVersion(versionId);
            });
        }

        async function doDeleteOutlineVersion(versionId) {
            try {
                const response = await fetch('/api/outline/delete/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-CSRFToken': getCookie('csrftoken')
                    },
                    body: `project_id=${projectId}&version_id=${versionId}`
                });
                const data = await response.json();
                if (data.success) {
                    closeModal();
                    showToast('删除成功！', 'success');
                    if (currentVersionId === versionId) {
                        currentVersionId = null;
                        document.getElementById('outline-content').value = '';
                        document.getElementById('outline-preview').innerHTML = '<div class="outline-empty"><i class="fas fa-file-text"></i><p>暂无大纲内容</p></div>';
                        document.getElementById('outline-version').textContent = '-';
                    }
                    loadOutlineVersions();
                } else {
                    closeModal();
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                closeModal();
                showToast('网络错误，请重试', 'error');
            }
        }

        function showModal(title, message, action) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('confirm-modal').classList.add('show');
            modalAction = action;
        }

        function closeModal() {
            document.getElementById('confirm-modal').classList.remove('show');
            modalAction = null;
        }

        function executeModalAction() {
            if (modalAction) {
                modalAction();
            }
        }

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-item toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastSlideOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function goBack() {
            window.location.href = `project.html?id=${projectId}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
