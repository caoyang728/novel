<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Agent - 重置密码</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <h2><i class="fas fa-key me-2"></i>重置密码</h2>
            <p>通过邮箱找回您的账号</p>
        </div>
        
        {% if error %}
        <div class="alert alert-error mb-4">
            <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
        </div>
        {% endif %}
        
        {% if success %}
        <div class="alert alert-success mb-4">
            <i class="fas fa-check-circle me-2"></i>{{ success }}
        </div>
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">用户名</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" name="username" class="form-control" style="border-radius: 0 12px 12px 0;" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-semibold">注册邮箱</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" name="email" class="form-control" style="border-radius: 0 12px 12px 0;" required>
                </div>
            </div>
            
            <div class="mb-3">
                <label class="form-label fw-semibold">新密码</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" class="form-control" style="border-radius: 0 12px 12px 0;" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-semibold">确认新密码</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password_confirm" class="form-control" style="border-radius: 0 12px 12px 0;" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3">
                <i class="fas fa-key me-2"></i>重置密码
            </button>
        </form>
        
        <div class="text-center">
            <a href="{% url 'login' %}" class="text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i>返回登录
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
