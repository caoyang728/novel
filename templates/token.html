<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Agent - Token统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/token.css" rel="stylesheet">
</head>
<body class="page-full-height sidebar-layout">
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p id="loadingText" class="text-sm font-medium">加载中...</p>
        </div>
    </div>

    <!-- 左侧导航栏 -->
    <div class="app-sidebar">
        <div class="app-sidebar-header">
            <h2><i class="fas fa-feather-alt"></i> Novel Agent</h2>
        </div>
        <ul class="app-nav-links">
            <li><a href="index.html"><i class="fas fa-book"></i>我的书架</a></li>
            <li><a href="token.html" class="active"><i class="fas fa-chart-line"></i>Token统计</a></li>
            <li><a href="llm_config.html"><i class="fas fa-cog"></i>LLM配置</a></li>
        </ul>
        <div class="app-user-info">
            <div class="username" id="username">-</div>
            <div class="token-usage" id="token-usage">今日 Token: -</div>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </button>
        </div>
    </div>

    <!-- 右侧内容区 -->
    <div class="app-main">
        <div class="page-header">
            <div class="page-header-inner">
                <div class="header-title-area">
                    <h1 class="header-title"><i class="fas fa-chart-line me-2"></i>Token统计</h1>
                    <p class="header-subtitle">查看您的Token使用情况和缓存命中统计</p>
                </div>
            </div>
        </div>

        <div class="page-content sidebar-content">
            <!-- 时间范围筛选 -->
            <div class="d-flex gap-2 mb-4">
                <button class="btn btn-outline-primary active" onclick="loadStats('today', this)">今日</button>
                <button class="btn btn-outline-primary" onclick="loadStats('week', this)">本周</button>
                <button class="btn btn-outline-primary" onclick="loadStats('month', this)">本月</button>
                <button class="btn btn-outline-primary" onclick="loadStats('all', this)">全部</button>
            </div>

            <!-- 统计卡片 -->
            <div class="row g-4 mb-4">
                <div class="col-md-2-4">
                    <div class="stat-card total">
                        <div class="stat-value" id="stat-input">-</div>
                        <div class="stat-label">输入Token</div>
                    </div>
                </div>
                <div class="col-md-2-4">
                    <div class="stat-card output">
                        <div class="stat-value" id="stat-output">-</div>
                        <div class="stat-label">输出Token</div>
                    </div>
                </div>
                <div class="col-md-2-4">
                    <div class="stat-card hit">
                        <div class="stat-value" id="stat-cache-hit">-</div>
                        <div class="stat-label">输入缓存命中</div>
                    </div>
                </div>
                <div class="col-md-2-4">
                    <div class="stat-card miss">
                        <div class="stat-value" id="stat-cache-miss">-</div>
                        <div class="stat-label">输入缓存未命中</div>
                    </div>
                </div>
                <div class="col-md-2-4">
                    <div class="stat-card cost">
                        <div class="stat-value" id="stat-cost">-</div>
                        <div class="stat-label">预估费用</div>
                    </div>
                </div>
            </div>

            <!-- Tab 标签页 -->
            <ul class="nav nav-tabs mb-4" id="tokenTabs">
                <li class="nav-item">
                    <a class="nav-link active" id="detail-tab" data-bs-toggle="tab" href="#detail-panel">
                        <i class="fas fa-list me-2"></i>详细记录
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" id="project-tab" data-bs-toggle="tab" href="#project-panel">
                        <i class="fas fa-book me-2"></i>按项目统计
                    </a>
                </li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane fade show active" id="detail-panel">
                    <div class="content-card">
                        <p class="text-muted small mb-3">仅显示最近100条记录</p>
                        <div id="logs-container">
                            <div class="table-responsive">
                                <table class="table">
                                    <thead>
                                        <tr>
                                            <th>时间</th>
                                            <th>项目</th>
                                            <th>任务类型</th>
                                            <th>输入</th>
                                            <th>输出</th>
                                            <th>缓存命中</th>
                                            <th>缓存未命中</th>
                                            <th>费用</th>
                                        </tr>
                                    </thead>
                                    <tbody id="logs-table-body">
                                        <tr>
                                            <td colspan="8" class="text-center text-muted py-4">加载中...</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="tab-pane fade" id="project-panel">
                    <div class="content-card">
                        <div id="project-stats-container">
                            <div id="project-stats">
                                <p class="text-center text-muted py-4">加载中...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div class="dialog-overlay" id="confirm-modal">
        <div class="dialog dialog-sm">
            <div class="dialog-header">
                <h5 id="modal-title">确认操作</h5>
                <button class="btn-close" onclick="closeModal()"></button>
            </div>
            <div class="dialog-body">
                <p id="modal-message">确定要执行此操作吗？</p>
            </div>
            <div class="dialog-footer">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-save" id="modal-confirm-btn" onclick="executeModalAction()">确认</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/token.js"></script>
</body>
</html>
