{% comment %}
角色字段分组模板，用于减少手动创建/AI生成/编辑弹窗中的字段重复
使用方式：{% include "_character_fields.html" with prefix="create" %}
prefix - 表单元素 ID 前缀（如 "create"、"aiGenerated"）
{% endcomment %}
{% with p=prefix %}
<div class="form-row">
    <div class="form-group"><label>角色名称 *</label><input type="text" id="{{ p }}Name" placeholder="输入角色名称"></div>
    <div class="form-group"><label>角色定位</label>
        <select id="{{ p }}Role">
            <option value="配角" selected>配角</option>
            <option value="主角">主角</option>
            <option value="反派">反派</option>
            <option value="路人">路人</option>
        </select>
    </div>
</div>
<div class="form-row">
    <div class="form-group">
        <label>性别</label>
        <select id="{{ p }}Gender">
            <option value="未知">未知</option>
            <option value="男">男</option>
            <option value="女">女</option>
        </select>
    </div>
    <div class="form-group"><label>年龄</label><input type="{% if prefix == 'create' or prefix == 'edit' %}number{% else %}text{% endif %}" id="{{ p }}Age" placeholder="如：25" min="0" max="9999"></div>
</div>
<div class="form-group full-width"><label>身份</label><input type="text" id="{{ p }}Identity" placeholder="如：青云门弟子、魔教少主"></div>
<div class="form-row">
    <div class="form-group"><label>性格特征</label><textarea id="{{ p }}Personality" placeholder="性格特征"></textarea></div>
    <div class="form-group"><label>外貌/体态</label><textarea id="{{ p }}Appearance" placeholder="外貌/体态"></textarea></div>
</div>
<div class="form-group full-width"><label>势力/阵营</label><input type="text" id="{{ p }}Faction" placeholder="势力/阵营（如：青云门、魔教等）"></div>
<div class="form-row">
    <div class="form-group"><label>优点</label><textarea id="{{ p }}Strengths" placeholder="如：武艺高强、足智多谋"></textarea></div>
    <div class="form-group"><label>缺点</label><textarea id="{{ p }}Flaws" placeholder="如：过于自负、优柔寡断"></textarea></div>
</div>
<div class="form-row">
    <div class="form-group"><label>执念/软肋</label><textarea id="{{ p }}Obsession" placeholder="如：追求剑道极致"></textarea></div>
    <div class="form-group"><label>核心动机</label><textarea id="{{ p }}Motivation" placeholder="这辈子最想要什么"></textarea></div>
</div>
<div class="form-row">
    <div class="form-group"><label>能力</label><textarea id="{{ p }}Abilities" placeholder="如：青云剑诀、御剑术"></textarea></div>
    <div class="form-group"><label>禁忌</label><textarea id="{{ p }}Taboos" placeholder="如：不可动情"></textarea></div>
</div>
<div class="form-row">
    <div class="form-group"><label>秘密</label><textarea id="{{ p }}Secrets" placeholder="如：身怀上古血脉"></textarea></div>
    <div class="form-group"><label>过往黑历史</label><textarea id="{{ p }}DarkHistory" placeholder="如：曾误杀无辜"></textarea></div>
</div>
<div class="form-group full-width"><label>背景故事</label><textarea id="{{ p }}Background" style="min-height: 80px;"></textarea></div>
<div class="form-group full-width"><label>成长轨迹</label><textarea id="{{ p }}Development" style="min-height: 80px;"></textarea></div>
<div class="form-group full-width"><label>弱点代价</label><textarea id="{{ p }}Weaknesses" placeholder="弱点与代价"></textarea></div>
<div class="form-group full-width"><label>标签</label><input type="text" id="{{ p }}Tags" placeholder="标签（逗号分隔，如：正派,剑客,高冷）"></div>
{% endwith %}
