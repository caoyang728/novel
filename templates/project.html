<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/project.css" rel="stylesheet">
</head>
<body>
    <div class="page-header-wrapper">
        <div class="page-header-content">
            <button class="back-btn" id="backButton">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-main">
                <h1 class="project-title" id="project-title">-</h1>
                <p class="project-meta" id="project-description">暂无描述</p>
            </div>
            <div class="header-actions">
                <button class="btn-edit" onclick="editProject()">
                    <i class="fas fa-edit me-1"></i> 编辑
                </button>
            </div>
        </div>
    </div>

    <div class="container main-container">
        <div id="loadingOverlay" class="loading-overlay">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <p id="loadingText" class="text-sm font-medium">处理中...</p>
            </div>
        </div>

        <div class="section-title">项目统计</div>
        <div class="row g-3 mb-5">
            <div class="col-md-2 col-sm-4">
                <div class="stat-card volume">
                    <div class="stat-icon volume">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <div class="stat-value" id="volume-count">0</div>
                    <div class="stat-label">卷数量</div>
                </div>
            </div>
            <div class="col-md-2 col-sm-4">
                <div class="stat-card chapter">
                    <div class="stat-icon chapter">
                        <i class="fas fa-list-ul"></i>
                    </div>
                    <div class="stat-value" id="chapter-count">0</div>
                    <div class="stat-label">总章节数</div>
                </div>
            </div>
            <div class="col-md-2 col-sm-4">
                <div class="stat-card summary">
                    <div class="stat-icon summary">
                        <i class="fas fa-file-text"></i>
                    </div>
                    <div class="stat-value" id="chapter-summary">0</div>
                    <div class="stat-label">章节概要</div>
                </div>
            </div>
            <div class="col-md-2 col-sm-4">
                <div class="stat-card content">
                    <div class="stat-icon content">
                        <i class="fas fa-file-lines"></i>
                    </div>
                    <div class="stat-value" id="chapter-content">0</div>
                    <div class="stat-label">正文内容</div>
                </div>
            </div>
            <div class="col-md-2 col-sm-4">
                <div class="stat-card finalized">
                    <div class="stat-icon finalized">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-value" id="chapter-finalized">0</div>
                    <div class="stat-label">定稿章节</div>
                </div>
            </div>
            <div class="col-md-2 col-sm-4">
                <div class="stat-card published">
                    <div class="stat-icon published">
                        <i class="fas fa-globe"></i>
                    </div>
                    <div class="stat-value" id="chapter-published">0</div>
                    <div class="stat-label">发布章节</div>
                </div>
            </div>
        </div>

        <div class="section-title">功能入口</div>
        <div class="row g-4 mb-5">
            <div class="col-md-6">
                <div class="action-card" id="action-world-workspace" onclick="openWorldWorkspace()">
                    <div class="action-icon indigo">
                        <i class="fas fa-globe-americas"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">世界观</div>
                        <div class="action-desc">系统化构建和管理世界观</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="action-card" id="action-character" onclick="openCharacterManager()">
                    <div class="action-icon blue">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">人物清单</div>
                        <div class="action-desc">管理小说中的角色人物</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="action-card" id="action-timeline" onclick="openTimelineManager()">
                    <div class="action-icon cyan">
                        <i class="fas fa-timeline"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">故事时间线</div>
                        <div class="action-desc">管理小说的故事时间线和关键事件</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="action-card" id="action-outline" onclick="openOutlineBuilder()">
                    <div class="action-icon sky">
                        <i class="fas fa-wand-magic-sparkles"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title" id="outline-action-title">大纲构建</div>
                        <div class="action-desc" id="outline-action-desc">通过AI对话构建小说大纲</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="action-card" id="action-volume" onclick="openVolumeGenerator()">
                    <div class="action-icon purple">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">卷管理</div>
                        <div class="action-desc">根据大纲自动生成卷结构</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="action-card" id="action-chapter" onclick="openChapterGenerator()">
                    <div class="action-icon green">
                        <i class="fas fa-file-lines"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">章节管理</div>
                        <div class="action-desc">根据卷内容自动生成章节大纲</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="action-card" id="action-content" onclick="openContentManager()">
                    <div class="action-icon amber">
                        <i class="fas fa-folder-open"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">内容管理</div>
                        <div class="action-desc">查看和管理所有大纲、卷、章节内容</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="action-card" id="action-note" onclick="openNoteManager()">
                    <div class="action-icon teal">
                        <i class="fas fa-feather"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">随手记</div>
                        <div class="action-desc">记录和整理想到的小说片段</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">最近活动</div>
        <div class="activity-card">
            <div class="activity-header">
                <i class="fas fa-clock"></i>
                <h5>活动记录</h5>
            </div>
            <div class="activity-body">
                <div class="empty-activity">
                    <div class="empty-activity-icon">
                        <i class="fas fa-inbox"></i>
                    </div>
                    <p>暂无活动记录</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editProjectModal">
        <div class="modal-content">
            <div class="modal-header">
                <h5><i class="fas fa-edit me-2"></i>编辑项目</h5>
                <button class="btn btn-close" onclick="closeEditModal()"></button>
            </div>
            <div class="modal-body">
                <form id="editProjectForm">
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label class="form-label mb-0">小说名称</label>
                            <button type="button" class="ai-generate-btn" id="ai-generate-title-btn" onclick="generateTitle()">
                                <i class="fas fa-sparkles"></i> AI生成
                            </button>
                        </div>
                        <input type="text" class="form-control" id="edit-title" placeholder="输入小说名称" required>
                        <div id="title-suggestions-container" style="display: none;">
                            <div class="title-suggestions">
                                <div class="title-suggestions-header">
                                    <i class="fas fa-lightbulb"></i>
                                    AI推荐的书名
                                </div>
                                <div class="title-suggestions-list" id="title-suggestions-list"></div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label class="form-label mb-0">小说简介</label>
                            <button type="button" class="ai-generate-btn" id="ai-generate-desc-btn" onclick="generateDescription()">
                                <i class="fas fa-sparkles"></i> AI生成
                            </button>
                        </div>
                        <textarea class="form-control" id="edit-description" rows="4" placeholder="输入小说简介"></textarea>
                        <div id="description-suggestions-container" style="display: none; margin-top: 0.75rem;">
                            <div class="description-suggestions">
                                <div class="description-suggestions-header">
                                    <i class="fas fa-lightbulb"></i>
                                    AI推荐的简介
                                </div>
                                <div class="description-suggestion-content" id="description-suggestion-content"></div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">
                    <i class="fas fa-times me-1"></i> 取消
                </button>
                <button class="btn btn-gradient-success" onclick="saveProjectEdit()">
                    <i class="fas fa-check me-1"></i> 保存
                </button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmModalLabel">提示</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmModalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmModalBtn">确定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 世界观管理模态框 -->
    <div class="modal fade" id="worldviewModal" tabindex="-1" aria-labelledby="worldviewModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="worldviewModalLabel">
                        <i class="fas fa-globe"></i> 世界观设定
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <button class="btn btn-primary btn-sm mb-3" onclick="showWorldviewForm()">
                            <i class="fas fa-plus"></i> 新增设定
                        </button>
                    </div>
                    <div id="worldviewForm" class="card mb-3" style="display: none;">
                        <div class="card-body">
                            <input type="hidden" id="worldview-id">
                            <div class="row">
                                <div class="col-md-4 mb-2">
                                    <label class="form-label">分类</label>
                                    <select class="form-select" id="worldview-category">
                                        <option value="worldview">世界观</option>
                                        <option value="setting">设定体系</option>
                                        <option value="history">历史背景</option>
                                        <option value="culture">文化风俗</option>
                                        <option value="location">地点场景</option>
                                        <option value="rule">规则设定</option>
                                        <option value="plot_foreshadow">情节伏笔</option>
                                        <option value="other">其他</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label class="form-label">标题</label>
                                    <input type="text" class="form-control" id="worldview-title">
                                </div>
                                <div class="col-md-4 mb-2">
                                    <label class="form-label">关键词</label>
                                    <input type="text" class="form-control" id="worldview-keywords" placeholder="多个关键词用逗号分隔">
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">详细内容</label>
                                <textarea class="form-control" id="worldview-content" rows="5"></textarea>
                            </div>
                            <div class="text-end">
                                <button class="btn btn-secondary btn-sm" onclick="hideWorldviewForm()">取消</button>
                                <button class="btn btn-primary btn-sm" onclick="saveWorldview()">保存</button>
                            </div>
                        </div>
                    </div>
                    <div id="worldviewList" class="worldview-list"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 人物清单模态框 -->
    <div class="modal fade" id="characterModal" tabindex="-1" aria-labelledby="characterModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="characterModalLabel">
                        <i class="fas fa-users"></i> 人物清单
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <button class="btn btn-primary btn-sm mb-3" onclick="showCharacterForm()">
                            <i class="fas fa-plus"></i> 新增人物
                        </button>
                    </div>
                    <div id="characterForm" class="card mb-3" style="display: none;">
                        <div class="card-body">
                            <input type="hidden" id="character-id">
                            <div class="row">
                                <div class="col-md-3 mb-2">
                                    <label class="form-label">姓名</label>
                                    <input type="text" class="form-control" id="character-name">
                                </div>
                                <div class="col-md-3 mb-2">
                                    <label class="form-label">角色类型</label>
                                    <select class="form-select" id="character-role-type">
                                        <option value="protagonist">主角</option>
                                        <option value="supporting">配角</option>
                                        <option value="antagonist">反派</option>
                                        <option value="minor">路人</option>
                                        <option value="narrator">旁白/叙述者</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-2">
                                    <label class="form-label">性别</label>
                                    <select class="form-select" id="character-gender">
                                        <option value="male">男</option>
                                        <option value="female">女</option>
                                        <option value="unknown">未知</option>
                                    </select>
                                </div>
                                <div class="col-md-3 mb-2">
                                    <label class="form-label">标签/签名</label>
                                    <input type="text" class="form-control" id="character-tagline" placeholder="人物标签">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-2">
                                    <label class="form-label">外貌特征</label>
                                    <textarea class="form-control" id="character-appearance" rows="2"></textarea>
                                </div>
                                <div class="col-md-6 mb-2">
                                    <label class="form-label">性格特点</label>
                                    <textarea class="form-control" id="character-personality" rows="2"></textarea>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-2">
                                    <label class="form-label">背景故事</label>
                                    <textarea class="form-control" id="character-backstory" rows="2"></textarea>
                                </div>
                                <div class="col-md-6 mb-2">
                                    <label class="form-label">核心动机</label>
                                    <textarea class="form-control" id="character-motivation" rows="2"></textarea>
                                </div>
                            </div>
                            <div class="text-end">
                                <button class="btn btn-secondary btn-sm" onclick="hideCharacterForm()">取消</button>
                                <button class="btn btn-primary btn-sm" onclick="saveCharacter()">保存</button>
                            </div>
                        </div>
                    </div>
                    <div id="characterList" class="character-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/project.js"></script>
</body>
</html>
