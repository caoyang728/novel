<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Agent - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/login.css" rel="stylesheet">
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p id="loadingText" class="text-sm font-medium">处理中...</p>
        </div>
    </div>

    <div class="login-card">
        <div class="login-header">
            <a href="index.html" class="back-btn" style="position: absolute; top: 1.5rem; left: 1.5rem;">
                <i class="fas fa-arrow-left"></i>
            </a>
            <h2><i class="fas fa-feather-alt me-2"></i>Novel Agent</h2>
            <p>登录以继续创作</p>
        </div>
        
        <div id="error-message" class="alert alert-error mb-4 d-none">
            <i class="fas fa-exclamation-circle me-2"></i><span id="error-text"></span>
        </div>
        
        <form id="login-form">
            <div class="mb-3">
                <label class="form-label fw-semibold">用户名</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" id="username" class="form-control" style="border-radius: 0 12px 12px 0;" autocomplete="username" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-semibold">密码</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" class="form-control" style="border-radius: 0 12px 12px 0;" autocomplete="current-password" required>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3" id="login-btn">
                <i class="fas fa-sign-in-alt me-2"></i>登录
            </button>
        </form>
        
        <div class="text-center">
            <a href="register.html" class="text-decoration-none me-3">
                <i class="fas fa-user-plus me-1"></i>注册账号
            </a>
            <a href="/reset-password/" class="text-decoration-none">
                <i class="fas fa-key me-1"></i>重置密码
            </a>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/login.js"></script>
</body>
</html>
