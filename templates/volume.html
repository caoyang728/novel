<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卷管理 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/volume.css" rel="stylesheet">
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p id="loadingText">加载中...</p>
        </div>
    </div>

    <div class="main-content-full">
        <div class="content-header">
            <div class="header-left">
                <button class="btn btn-outline-secondary" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div>
                    <h5>卷管理</h5>
                    <span class="badge badge-info" id="project-title">-</span>
                </div>
            </div>
            <div class="btn-group-custom">
                <div class="version-select-group">
                    <label>大纲版本</label>
                    <select class="form-select form-select-sm" id="outline-select">
                        <option value="">请选择大纲版本</option>
                    </select>
                </div>
                <div class="version-select-group">
                    <label>卷版本</label>
                    <select class="form-select form-select-sm" id="volume-version-select">
                        <option value="">请选择卷版本</option>
                    </select>
                </div>
                <button class="btn btn-gradient-success" onclick="generateVolumes()" id="generate-btn" disabled>
                    <i class="fas fa-magic"></i> 生成卷
                </button>
                <button class="btn btn-gradient-primary" onclick="saveVersion()" id="save-btn" disabled>
                    <i class="fas fa-save"></i> 保存版本
                </button>
                <button class="btn btn-outline-gradient" onclick="finalizeVersion()" id="finalize-btn" disabled>
                    <i class="fas fa-check-circle"></i> 定稿
                </button>
            </div>
        </div>

        <div class="three-column-view">
            <div class="left-column">
                <div class="volume-list-card">
                    <div class="card-header">
                        <div class="d-flex align-items-center gap-2">
                            <h5><i class="fas fa-book me-2"></i>卷列表</h5>
                            <span class="badge bg-primary text-white" id="volume-count">0 卷</span>
                        </div>
                    </div>
                    <div class="card-body" id="volume-list">
                        <div class="volume-empty">
                            <i class="fas fa-file-text"></i>
                            <p>选择大纲版本并生成卷</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="middle-column">
                <div class="volume-detail-card">
                    <div class="card-header">
                        <h5><i class="fas fa-file-alt me-2"></i>卷详情</h5>
                        <div class="detail-header-actions" id="detail-actions">
                            <button class="detail-btn detail-btn-edit" onclick="openEditModal()" disabled>
                                <i class="fas fa-pencil"></i> 编辑
                            </button>
                            <button class="detail-btn detail-btn-delete" onclick="deleteVolume()" disabled>
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </div>
                    </div>
                    <div class="card-body" id="volume-detail">
                        <div class="detail-empty">
                            <i class="fas fa-search"></i>
                            <p>请从左侧选择一个卷</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="chat-card">
                    <div class="card-header">
                        <h5><i class="fas fa-robot me-2"></i>AI卷助手</h5>
                    </div>
                    <div class="card-body" id="chat-messages">
                        <div class="chat-message assistant">
                            <div class="chat-message-avatar avatar-ai me-2">AI</div>
                            <div class="chat-bubble chat-bubble-assistant">
                                您好！我是卷生成助手。请先选择大纲版本，然后点击"生成卷"按钮，我将根据大纲内容为您生成卷结构。
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="chat-input-wrap">
                            <textarea id="chat-input" rows="3" placeholder="输入您的想法...（Shift+Enter 换行，Enter 发送）"></textarea>
                            <button class="btn-send" onclick="sendMessage()">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5 id="modal-title">确认操作</h5>
                <button class="btn btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p id="modal-message">确定要执行此操作吗？</p>
                <input type="text" id="modal-input" placeholder="请输入确认内容" style="display: none;">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modal-confirm-btn" onclick="executeModalAction()">确认</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5><i class="fas fa-pencil me-2"></i>编辑卷</h5>
                <button class="btn btn-close" onclick="closeEditModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-volume-index">
                <div>
                    <label class="form-label">卷标题</label>
                    <input type="text" id="edit-title" placeholder="输入卷标题">
                </div>
                <div>
                    <label class="form-label">卷概述</label>
                    <textarea id="edit-summary" placeholder="输入卷的内容概述..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEditVolume()">保存</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/volume.js"></script>
</body>
</html>
