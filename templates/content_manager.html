<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            min-height: 100vh;
        }
        .page-header-wrapper {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 1rem 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .content-tabs {
            border-bottom: 1px solid #e2e8f0;
        }
        .content-tabs .nav-link {
            color: #64748b;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 1rem 1.5rem;
            font-weight: 500;
        }
        .content-tabs .nav-link.active {
            color: #0ea5e9;
            border-bottom-color: #0ea5e9;
            background: transparent;
        }
        .content-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 1rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .content-card:hover {
            border-color: #0ea5e9;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.1);
        }
        .content-card.active {
            border-color: #0ea5e9;
            background: rgba(14, 165, 233, 0.02);
        }
        .version-badge {
            font-size: 0.75rem;
        }
        .content-preview {
            background: #f8fafc;
            border-radius: 8px;
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
        }
        .empty-state {
            text-align: center;
            padding: 4rem;
        }
        .back-btn {
            color: #64748b;
            transition: color 0.2s;
        }
        .back-btn:hover {
            color: #0ea5e9;
        }
    </style>
</head>
<body>
    <div class="page-header-wrapper">
        <div class="container">
            <div class="d-flex align-items-center justify-between">
                <div class="d-flex align-items-center gap-3">
                    <a href="/index.html" class="back-btn">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h5 class="mb-0"><i class="fas fa-folder-open me-2"></i>内容管理</h5>
                </div>
                <span class="text-muted text-sm" id="project-title">-</span>
            </div>
        </div>
    </div>

    <div class="content-tabs">
        <div class="container">
            <ul class="nav nav-tabs" id="contentTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="outline-tab" data-bs-toggle="tab" data-bs-target="#outline-panel" type="button" role="tab">
                        <i class="fas fa-file-text me-1"></i> 大纲
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="volume-tab" data-bs-toggle="tab" data-bs-target="#volume-panel" type="button" role="tab">
                        <i class="fas fa-layer-group me-1"></i> 卷
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="chapter-tab" data-bs-toggle="tab" data-bs-target="#chapter-panel" type="button" role="tab">
                        <i class="fas fa-file-paragraph me-1"></i> 章节
                    </button>
                </li>
            </ul>
        </div>
    </div>

    <div class="container mt-4">
        <div class="tab-content" id="contentTabContent">
            <div class="tab-pane fade show active" id="outline-panel" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                        <div class="list-group" id="outline-list">
                            <div class="text-center py-4 text-muted">加载中...</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="content-preview" id="outline-preview">
                            <div class="empty-state">
                                <i class="fas fa-file-text text-gray-300" style="font-size: 3rem;"></i>
                                <p class="mt-3 text-muted">选择一个大纲版本查看内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="volume-panel" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                        <div class="list-group" id="volume-list">
                            <div class="text-center py-4 text-muted">加载中...</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="content-preview" id="volume-preview">
                            <div class="empty-state">
                                <i class="fas fa-layer-group text-gray-300" style="font-size: 3rem;"></i>
                                <p class="mt-3 text-muted">选择一个卷版本查看内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="chapter-panel" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                        <div class="list-group" id="chapter-list">
                            <div class="text-center py-4 text-muted">加载中...</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="content-preview" id="chapter-preview">
                            <div class="empty-state">
                                <i class="fas fa-file-paragraph text-gray-300" style="font-size: 3rem;"></i>
                                <p class="mt-3 text-muted">选择一个章节查看内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const projectId = new URLSearchParams(window.location.search).get('project_id');
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProjectInfo();
            loadOutlineVersions();
            
            document.getElementById('outline-tab').addEventListener('click', function() {
                loadOutlineVersions();
            });
            document.getElementById('volume-tab').addEventListener('click', function() {
                loadVolumeVersions();
            });
            document.getElementById('chapter-tab').addEventListener('click', function() {
                loadChapters();
            });
        });
        
        async function loadProjectInfo() {
            const response = await fetch(`/api/projects/${projectId}/`, {
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('project-title').textContent = data.project.title;
            }
        }
        
        async function loadOutlineVersions() {
            const response = await fetch(`/api/projects/${projectId}/outline/versions/`, {
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await response.json();
            if (data.success) {
                const container = document.getElementById('outline-list');
                if (data.versions.length === 0) {
                    container.innerHTML = '<div class="text-center py-4 text-muted">暂无大纲版本</div>';
                    return;
                }
                container.innerHTML = data.versions.map(v => `
                    <div class="content-card" data-id="${v.id}" onclick="loadOutlineContent(${v.id})">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="font-weight-medium">v${v.version_number}</span>
                                ${v.is_finalized ? '<span class="badge badge-success ms-2 version-badge">定稿</span>' : ''}
                            </div>
                            <small class="text-muted">${formatDate(v.updated_at)}</small>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        async function loadOutlineContent(id) {
            document.querySelectorAll('[data-id]').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-id="${id}"]`)?.classList.add('active');
            
            const response = await fetch(`/api/outline/version/${id}/`, {
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('outline-preview').innerHTML = marked.parse(data.outline.content || '<p class="text-muted">空内容</p>');
            }
        }
        
        async function loadVolumeVersions() {
            const response = await fetch(`/api/projects/${projectId}/volume/versions/`, {
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await response.json();
            if (data.success) {
                const container = document.getElementById('volume-list');
                if (data.versions.length === 0) {
                    container.innerHTML = '<div class="text-center py-4 text-muted">暂无卷版本</div>';
                    return;
                }
                container.innerHTML = data.versions.map(v => `
                    <div class="content-card" data-volume-id="${v.id}" onclick="loadVolumeContent(${v.id})">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="font-weight-medium">v${v.version_number}</span>
                                ${v.is_finalized ? '<span class="badge badge-success ms-2 version-badge">定稿</span>' : ''}
                            </div>
                            <small class="text-muted">${formatDate(v.updated_at)}</small>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        async function loadVolumeContent(id) {
            document.querySelectorAll('[data-volume-id]').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-volume-id="${id}"]`)?.classList.add('active');
            
            const response = await fetch(`/api/volume/version/${id}/`, {
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('volume-preview').innerHTML = marked.parse(data.volume.content || '<p class="text-muted">空内容</p>');
            }
        }
        
        async function loadChapters() {
            const response = await fetch(`/api/projects/${projectId}/chapters/`, {
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await response.json();
            if (data.success) {
                const container = document.getElementById('chapter-list');
                if (data.chapters.length === 0) {
                    container.innerHTML = '<div class="text-center py-4 text-muted">暂无章节</div>';
                    return;
                }
                container.innerHTML = data.chapters.map(c => `
                    <div class="content-card" data-chapter-id="${c.id}" onclick="loadChapterContent(${c.id})">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="font-weight-medium">第${c.chapter_number}章 ${c.title}</span>
                            </div>
                            <small class="text-muted">${formatDate(c.updated_at)}</small>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        async function loadChapterContent(id) {
            document.querySelectorAll('[data-chapter-id]').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-chapter-id="${id}"]`)?.classList.add('active');
            
            const response = await fetch(`/api/chapters/${id}/`, {
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await response.json();
            if (data.success) {
                document.getElementById('chapter-preview').innerHTML = marked.parse(data.chapter.content || '<p class="text-muted">空内容</p>');
            }
        }
        
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
        
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
