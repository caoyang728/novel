<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/content.css" rel="stylesheet">
</head>
<body>
    <div class="page-header-wrapper">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <a href="javascript:void(0)" class="back-btn">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h5 class="mb-0"><i class="fas fa-folder-open me-2"></i>内容管理</h5>
                </div>
                <span class="text-muted" id="project-title">-</span>
            </div>
        </div>
    </div>

    <div class="content-tabs">
        <div class="container-fluid px-4">
            <ul class="nav nav-tabs" id="contentTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="outline-tab" data-bs-toggle="tab" data-bs-target="#outline-panel" type="button" role="tab">
                        <i class="fas fa-file-text me-1"></i> 大纲
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="volume-tab" data-bs-toggle="tab" data-bs-target="#volume-panel" type="button" role="tab">
                        <i class="fas fa-layer-group me-1"></i> 卷
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="chapter-tab" data-bs-toggle="tab" data-bs-target="#chapter-panel" type="button" role="tab">
                        <i class="fas fa-file-paragraph me-1"></i> 章节
                    </button>
                </li>
            </ul>
        </div>
    </div>

    <div class="container-fluid px-4 mt-4">
        <div class="tab-content" id="contentTabContent">
            <div class="tab-pane fade show active" id="outline-panel" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                        <h6 class="mb-3"><i class="fas fa-history me-2"></i>大纲版本</h6>
                        <div id="outline-list">
                            <div class="text-center py-4 text-muted">加载中...</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <h6 class="mb-3"><i class="fas fa-eye me-2"></i>大纲预览</h6>
                        <div class="content-preview" id="outline-preview">
                            <div class="empty-state">
                                <i class="fas fa-file-text" style="font-size: 3rem; opacity: 0.3;"></i>
                                <p class="mt-3">选择一个大纲版本查看内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="volume-panel" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                        <h6 class="mb-3"><i class="fas fa-history me-2"></i>卷版本</h6>
                        <div id="volume-list">
                            <div class="text-center py-4 text-muted">加载中...</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <h6 class="mb-3"><i class="fas fa-eye me-2"></i>卷内容预览</h6>
                        <div class="content-preview" id="volume-preview">
                            <div class="empty-state">
                                <i class="fas fa-layer-group" style="font-size: 3rem; opacity: 0.3;"></i>
                                <p class="mt-3">选择一个卷版本查看内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="chapter-panel" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                        <h6 class="mb-3"><i class="fas fa-list me-2"></i>章节列表</h6>
                        <div id="chapter-list">
                            <div class="text-center py-4 text-muted">加载中...</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <h6 class="mb-3"><i class="fas fa-eye me-2"></i>章节内容预览</h6>
                        <div class="content-preview" id="chapter-preview">
                            <div class="empty-state">
                                <i class="fas fa-file-paragraph" style="font-size: 3rem; opacity: 0.3;"></i>
                                <p class="mt-3">选择一个章节查看内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/content.js"></script>
</body>
</html>
