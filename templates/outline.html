<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大纲构建 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <style>
        :root {
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --success: #34d399;
            --danger: #f87171;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #f9fafb;
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #6b7280;
        }
        ::placeholder {
            color: #6b7280 !important;
        }
        .text-muted {
            color: #9ca3af !important;
        }
        .btn-close {
            filter: brightness(0) invert(1);
        }
        .main-content-full {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .content-header {
            padding: 0.5rem 1.5rem;
            border-bottom: 1px solid #374151;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .content-header h5 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: #f9fafb;
        }
        .badge-info {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            border: none;
        }
        .btn-gradient {
            border: none;
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            cursor: pointer;
        }
        .btn-gradient:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .btn-gradient-primary {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            color: white;
        }
        .btn-gradient-primary:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .btn-gradient-success {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            color: white;
        }
        .btn-gradient-success:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(52, 211, 153, 0.3);
        }
        .btn-outline-gradient {
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-weight: 600;
            font-size: 0.875rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            cursor: pointer;
        }
        .btn-outline-gradient:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-outline-success {
            border: 1.5px solid #34d399;
            color: #34d399;
            background: transparent;
        }
        .btn-outline-success:hover:not(:disabled) {
            background: rgba(52, 211, 153, 0.1);
        }
        .btn-outline-secondary {
            border-radius: 10px;
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            border: 1.5px solid #4b5563;
            color: #d1d5db;
            background: transparent;
        }
        .btn-outline-secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: #6b7280;
            color: #f9fafb;
        }
        .split-view {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .sidebar-panel {
            width: 260px;
            background: #1f2937;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            margin: 0 0 1rem 1rem;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            transition: box-shadow 0.25s ease;
            border: 1px solid #374151;
        }
        .sidebar-panel:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .sidebar-section-header {
            padding: 0.875rem 1rem;
            background: #1f2937;
            font-weight: 600;
            font-size: 0.875rem;
            border-bottom: 1px solid #374151;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #d1d5db;
        }
        .version-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.625rem;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            color: #9ca3af;
        }
        .empty-state i {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            opacity: 0.6;
            color: #4b5563;
        }
        .empty-state p {
            font-size: 0.85rem;
            margin: 0;
        }
        .version-item {
            padding: 0.75rem;
            border-radius: 10px;
            margin-bottom: 0.375rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .version-item:hover {
            background: rgba(255,255,255,0.05);
            border-color: #374151;
        }
        .version-item.active {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.25);
        }
        .version-item.active .version-number {
            color: #818cf8;
        }
        .version-item-content {
            flex: 1;
            min-width: 0;
        }
        .version-item .version-number {
            font-weight: 600;
            font-size: 0.875rem;
            color: #f9fafb;
        }
        .version-item .version-meta {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 0.125rem;
        }
        .version-item-actions {
            display: flex;
            gap: 0.25rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .version-item:hover .version-item-actions {
            opacity: 1;
        }
        .btn-icon {
            width: 28px;
            height: 28px;
            padding: 0;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }
        .btn-icon.delete {
            color: #f87171;
            border-color: #f87171;
        }
        .btn-icon.delete:hover {
            background: rgba(248, 113, 113, 0.15);
        }
        .middle-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin: 0 1rem 1rem 1rem;
            overflow: hidden;
        }
        .right-panel {
            width: 35%;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            margin: 0 1rem 1rem 0;
            overflow: hidden;
        }
        .outline-card {
            background: #1f2937;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
            transition: box-shadow 0.25s ease;
            border: 1px solid #374151;
        }
        .outline-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .outline-card-header {
            padding: 0.875rem 1rem;
            background: #1f2937;
            border-bottom: 1px solid #374151;
            display: flex;
            align-items: center;
        }
        .outline-card-header h5 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 600;
            color: #f9fafb;
        }
        .outline-card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #outline-content {
            flex: 1;
            width: 100%;
            border: none;
            resize: none;
            padding: 1.25rem;
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.7;
            white-space: pre-wrap;
            background: #111827;
            color: #f9fafb;
        }
        #outline-content:focus {
            outline: none;
        }
        #outline-content::placeholder {
            color: #6b7280;
            font-size: 0.95rem;
        }
        #outline-preview {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem;
            line-height: 1.7;
            background: #1f2937;
            color: #d1d5db;
        }
        .outline-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #9ca3af;
        }
        .outline-empty i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
            color: #4b5563;
        }
        .outline-empty p {
            font-size: 0.9rem;
            margin: 0;
        }
        .chat-card {
            background: #1f2937;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex: 1;
            transition: box-shadow 0.25s ease;
            border: 1px solid #374151;
        }
        .chat-card:hover {
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .chat-card-body {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem 0.875rem;
            background: #111827;
        }
        .chat-card-footer {
            padding: 0.75rem;
            border-top: 1px solid #374151;
            background: #1f2937;
        }
        .chat-input-wrap {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }
        .chat-input-wrap textarea {
            flex: 1;
            border-radius: 12px;
            border: 1px solid #4b5563;
            padding: 0.625rem 0.875rem;
            font-size: 0.875rem;
            resize: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            min-height: 44px;
            max-height: 160px;
            background: #111827;
            color: #f9fafb;
        }
        .chat-input-wrap textarea:focus {
            outline: none;
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }
        .chat-input-wrap textarea::placeholder {
            color: #6b7280;
        }
        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35);
        }
        .btn-send:active {
            transform: translateY(0);
        }
        .btn-send:disabled {
            background: #4b5563;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.6;
        }
        .btn-send:disabled:hover {
            transform: none;
            box-shadow: none;
        }
        .outline-preview strong {
            color: #f87171;
            font-weight: bold;
        }
        .chat-message {
            display: flex;
            margin-bottom: 0.625rem;
        }
        .chat-message.user {
            justify-content: flex-end;
        }
        .chat-message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        .avatar-me {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            color: white;
        }
        .avatar-ai {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
        }
        .chat-bubble {
            max-width: 85%;
            padding: 0.875rem 1.125rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .chat-bubble-user {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .chat-bubble-assistant {
            background: #374151;
            color: #d1d5db;
            border-bottom-left-radius: 4px;
        }
        .chat-message-checkbox {
            width: 18px;
            height: 18px;
            margin-right: 0.5rem;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #818cf8;
        }
        .chat-message-checkbox:checked {
            background-color: #818cf8;
            border-color: #818cf8;
        }
        .chat-card-header-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn-delete-selected {
            padding: 0.375rem 0.75rem;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            transition: all 0.2s;
        }
        .btn-delete-selected:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(248, 113, 113, 0.3);
        }
        .btn-delete-selected:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-toggle-selection {
            padding: 0.4375rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: #818cf8;
            border: 1.5px solid #818cf8;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            transition: all 0.2s ease;
            min-width: 64px;
        }
        .btn-toggle-selection:hover {
            background: rgba(99, 102, 241, 0.1);
            transform: translateY(-1px);
        }
        .context-count-select {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.375rem 0.5rem;
        }
        .context-count-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #9ca3af;
            margin-bottom: 0;
        }
        .context-count-dropdown {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
            border-radius: 8px;
            border: 1px solid #4b5563;
            background-color: #111827;
            color: #f9fafb;
            cursor: pointer;
            min-width: 70px;
        }
        .selection-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .selection-actions .btn {
            padding: 0.4375rem 1rem !important;
            border-radius: 10px !important;
            font-size: 0.85rem !important;
            font-weight: 500 !important;
            cursor: pointer !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 0.375rem !important;
            transition: all 0.2s ease !important;
            white-space: nowrap !important;
            min-width: 90px !important;
            width: 90px !important;
            height: 36px !important;
            border: 1.5px solid transparent !important;
            line-height: 1 !important;
            margin: 0 !important;
        }
        .btn-cancel-selection {
            background: linear-gradient(135deg, #4b5563 0%, #374151 100%);
            color: #d1d5db;
            border-color: transparent;
        }
        .btn-cancel-selection:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(75, 85, 99, 0.35);
        }
        .btn-select-all {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            color: white;
            border-color: transparent;
        }
        .btn-select-all:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
        }
        .chat-message.selected {
            background: rgba(99, 102, 241, 0.1);
            border-radius: 8px;
        }
        .chat-message-checkbox {
            display: none;
        }
        .selection-mode .chat-message-checkbox {
            display: block;
            width: 18px;
            height: 18px;
            margin-right: 0.5rem;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #818cf8;
        }
        .selection-mode .chat-message-checkbox:checked {
            background-color: #818cf8;
            border-color: #818cf8;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-content {
            background: #1f2937;
            border-radius: 16px;
            width: 90%;
            max-width: 420px;
            overflow: hidden;
            animation: modalFadeIn 0.2s ease;
            border: 1px solid #374151;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #374151;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h5 {
            margin: 0;
            font-size: 1rem;
            font-weight: 600;
            color: #f9fafb;
        }
        .modal-body {
            padding: 1.25rem;
        }
        .modal-body p {
            margin: 0;
            color: #d1d5db;
        }
        .modal-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid #374151;
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }
        .modal-footer .btn {
            padding: 0.5rem 1.25rem;
            border-radius: 10px;
        }
        .modal-footer .btn-outline-secondary {
            border: 1.5px solid #4b5563;
            color: #d1d5db;
            background: transparent;
        }
        .modal-footer .btn-outline-secondary:hover {
            background: rgba(255,255,255,0.05);
        }
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast-item {
            background: #1f2937;
            color: #f9fafb;
            padding: 0.875rem 1.25rem;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: toastSlideIn 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
            min-width: 280px;
            border: 1px solid #374151;
        }
        .toast-item.toast-success {
            background: linear-gradient(135deg, #34d399 0%, #10b981 100%);
            color: white;
            border: none;
        }
        .toast-item.toast-error {
            background: linear-gradient(135deg, #f87171 0%, #ef4444 100%);
            color: white;
            border: none;
        }
        @keyframes toastSlideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes toastSlideOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(100%); }
        }
        .form-select-sm {
            border-radius: 10px;
            border-color: #4b5563;
            font-size: 0.875rem;
            background-color: #111827;
            color: #f9fafb;
        }
        .form-select-sm:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }
        .btn-group-custom {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .btn-group-toggle .btn {
            border-radius: 6px;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            border: 1px solid #4b5563;
            background: transparent;
            color: #9ca3af;
            transition: all 0.2s;
            line-height: 1.2;
        }
        .btn-group-toggle .btn.active {
            background: #818cf8;
            color: white;
            border-color: #818cf8;
        }
        .btn-group-toggle .btn:not(.active):hover {
            border-color: #818cf8;
            color: #818cf8;
        }
        .badge-secondary {
            background: rgba(75, 85, 99, 0.3);
            color: #9ca3af;
            border: none;
        }
        .badge-success {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
            border: none;
        }
        .btn-outline-gradient.btn-outline-success {
            border: 1.5px solid #34d399;
            color: #34d399;
        }
        .btn-outline-gradient.btn-outline-success:hover:not(:disabled) {
            background: rgba(52, 211, 153, 0.1);
        }
        .btn-outline-danger {
            border: 1.5px solid #f87171;
            color: #f87171;
            background: transparent;
        }
        .btn-outline-danger:hover {
            background: rgba(248, 113, 113, 0.15);
        }
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        .loading-overlay.show {
            display: flex;
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay"></div>
    <div class="main-content-full">
        <div class="content-header">
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-outline-secondary" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div>

            <div class="sidebar-panel">
                <div class="sidebar-section-header">
                    <i class="fas fa-layer-group"></i>
                    <span>大纲版本</span>
                </div>
                <div class="version-list" id="outline-versions">
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>暂无大纲版本</p>
                    </div>
                </div>
            </div>

            <div class="middle-panel">
                <div class="outline-card">
                    <div class="outline-card-header d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2">
                            <h5><i class="fas fa-edit me-2"></i>大纲内容</h5>
                            <span class="badge badge-secondary text-sm" id="outline-version">-</span>
                        </div>
                        <div class="btn-group-toggle d-flex gap-1">
                            <button class="btn" id="btn-edit" onclick="showEditMode()">编辑</button>

                        <div id="outline-preview" class="markdown-content"></div>

            <div class="right-panel">
                <div class="chat-card">

                        <div class="chat-card-header-actions" id="chat-actions">
                            <div class="selection-actions" id="selection-actions" style="display: none;">
                                <button class="btn btn-cancel-selection" id="cancel-selection-btn" onclick="cancelSelection()">
                                    <i class="fas fa-times"></i> 取消
                                </button>
                                <button class="btn btn-delete-selected" id="delete-selected-btn" onclick="deleteSelectedMessages()" disabled>
                                    <i class="fas fa-trash"></i> 删除选中
                                </button>
                                <button class="btn btn-select-all" id="select-all-btn" onclick="toggleSelectAll()">
                                    <i class="fas fa-check-square"></i> 全选
                                </button>
                            </div>
                            <div class="context-count-select" id="context-count-select">
                                <label class="context-count-label">上下文:</label>
                                <select class="context-count-dropdown" id="context-count-dropdown">
                                    <option value="1">1组</option>
                                    <option value="2">2组</option>
                                    <option value="5">5组</option>
                                    <option value="10" selected>10组</option>
                                    <option value="20">20组</option>
                                    <option value="all">全部</option>
                                </select>
                            </div>
                            <button class="btn-toggle-selection" id="toggle-selection-btn" onclick="enterSelectionMode()">
                                <i class="fas fa-edit"></i> 选择
                            </button>
                        </div>
                    </div>
                    <div class="chat-card-body" id="chat-messages">
                        <div class="chat-message assistant">
                            <div class="chat-message-avatar avatar-ai me-2">AI</div>
                            <div class="chat-bubble chat-bubble-assistant">
                                您好！我是您的大纲助手，可以为您提供大纲的生成和优化服务。
                            </div>
                        </div>
                    </div>
                    <div class="chat-card-footer">
                        <div class="chat-input-wrap">
                            <textarea id="chat-input" rows="3" placeholder="输入您的修改意见...（Shift+Enter 换行，Enter 发送）"></textarea>
                            <button class="btn-send" id="send-message">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5 id="modal-title">确认操作</h5>
                <button class="btn btn-close" onclick="closeModal()"></button>
            </div>
            <div class="modal-body">
                <p id="modal-message">确定要执行此操作吗？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-gradient-primary" id="modal-confirm-btn" onclick="executeModalAction()">确认</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script>
        let projectId = null;
        let messages = [];
        let modalAction = null;
        let currentVersionId = null;
        let currentVersionNumber = 0;

        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            const urlParams = new URLSearchParams(window.location.search);
            projectId = urlParams.get('project_id');
            const params = new URLSearchParams(window.location.search);
            currentVersionId = params.get('version_id');
            
            if (projectId) {
                loadProjectInfo();
                loadOutlineVersions();
            }
            
            const savedContextCount = localStorage.getItem('outline_context_count');
            if (savedContextCount) {
                document.getElementById('context-count-dropdown').value = savedContextCount;
            }
            
            document.getElementById('context-count-dropdown').addEventListener('change', function() {
                localStorage.setItem('outline_context_count', this.value);
            });

            document.getElementById('outline-content').addEventListener('input', function() {
                updateButtons();
            });

            document.getElementById('send-message').addEventListener('click', sendMessage);
            document.getElementById('chat-input').addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            const chatInput = document.getElementById('chat-input');
            chatInput.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 160) + 'px';
            });

            const versionSelect = document.getElementById('version-select');
            let ignoreNextBlur = false;
            
            versionSelect.addEventListener('focus', function() {
                Array.from(this.options).forEach(option => {
                    if (option.dataset.originalText) {
                        option.text = option.dataset.originalText;
                    }
                });
            });
            
            versionSelect.addEventListener('change', function() {
                const versionId = this.value;
                if (versionId) {
                    loadOutlineVersion(versionId);
                    ignoreNextBlur = true;
                }
            });
            
            versionSelect.addEventListener('blur', function() {
                if (ignoreNextBlur) {
                    ignoreNextBlur = false;
                    return;
                }
                const selectedOption = this.options[this.selectedIndex];
                if (selectedOption && selectedOption.dataset.originalText) {
                    selectedOption.text = `当前版本 ${selectedOption.dataset.originalText}`;
                }
            });
        });

        async function checkAuth() {
            if (!api.isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const data = await api.get('/api/auth/user/');
                if (!data.success) {
                    api.logout();
                }
            } catch (error) {
                api.logout();
            }
        }

        async function loadProjectInfo() {
            try {
                const data = await api.get(`/api/projects/${projectId}/`);
                if (data.success) {
                    document.getElementById('project-title').textContent = data.project.title;
                }
            } catch (error) {
                console.error('Failed to load project:', error);
            }
        }

        async function loadOutlineVersions() {
            try {
                console.log('Loading outline versions for project:', projectId);
                const data = await api.get(`/api/projects/${projectId}/outline/versions/`);
                console.log('Loaded outline versions data:', data);
                
                if (data.success) {
                    renderOutlineVersions(data.versions);
                    
                    const select = document.getElementById('version-select');
                    select.innerHTML = '<option value="">选择版本...</option>';
                    
                    let finalizedVersion = null;
                    let latestVersion = null;
                    
                    data.versions.forEach(version => {
                        const option = document.createElement('option');
                        option.value = version.id;
                        const text = `v${version.version_number}${version.is_finalized ? ' (定稿)' : ''}`;
                        option.textContent = text;
                        option.dataset.originalText = text;
                        select.appendChild(option);
                        
                        if (version.is_finalized) {
                            finalizedVersion = version;
                        }
                        if (!latestVersion || version.version_number > latestVersion.version_number) {
                            latestVersion = version;
                        }
                    });
                    
                    console.log('Finalized version:', finalizedVersion);
                    console.log('Latest version:', latestVersion);
                    
                    if (currentVersionId) {
                        select.value = currentVersionId;
                        const option = select.querySelector(`option[value="${currentVersionId}"]`);
                        if (option) {
                            option.text = `当前版本 ${option.dataset.originalText}`;
                        }
                        console.log('Loading from currentVersionId:', currentVersionId);
                        loadOutlineVersion(currentVersionId);
                    } else if (finalizedVersion) {
                        select.value = finalizedVersion.id;
                        const option = select.querySelector(`option[value="${finalizedVersion.id}"]`);
                        if (option) {
                            option.text = `当前版本 ${option.dataset.originalText}`;
                        }
                        console.log('Loading from finalizedVersion:', finalizedVersion.id);
                        loadOutlineVersion(finalizedVersion.id);
                    } else if (latestVersion) {
                        select.value = latestVersion.id;
                        const option = select.querySelector(`option[value="${latestVersion.id}"]`);
                        if (option) {
                            option.text = `当前版本 ${option.dataset.originalText}`;
                        }
                        console.log('Loading from latestVersion:', latestVersion.id);
                        loadOutlineVersion(latestVersion.id);
                    }
                }
            } catch (error) {
                console.error('Failed to load outline versions:', error);
            }
        }

        function renderOutlineVersions(versions) {
            const container = document.getElementById('outline-versions');
            if (!versions || versions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>暂无大纲版本</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = versions.map(v => `
                <div class="version-item ${currentVersionId === v.id ? 'active' : ''}" onclick="loadOutlineVersion(${v.id})" data-version-id="${v.id}">
                    <div class="version-item-content">
                        <div class="version-number">
                            v${v.version_number}
                            ${v.is_finalized ? '<span class="badge badge-success ms-1" style="font-size: 0.65rem;">定稿</span>' : ''}
                        </div>
                        <div class="version-meta">
                            ${v.created_at ? v.created_at : ''}
                        </div>
                    </div>
                    <div class="version-item-actions">${v.is_finalized ? '' : `<button class="btn btn-outline-danger btn-icon delete" onclick="event.stopPropagation(); deleteOutlineVersion(${v.id})" title="删除版本"><i class="fas fa-trash"></i></button>`}
                    </div>
                </div>
            `).join('');
        }

        async function loadLatestOutline() {
            try {
                const data = await api.get(`/api/projects/${projectId}/outline/latest/`);
                if (data.success && data.outline) {
                    document.getElementById('outline-content').value = data.outline.content;
                    document.getElementById('outline-preview').innerHTML = marked.parse(data.outline.content || '');
                    if (data.outline.version_number !== undefined) {
                        document.getElementById('outline-version').textContent = `v${data.outline.version_number}`;
                    }
                    updateButtons();
                } else {
                    document.getElementById('outline-preview').innerHTML = '<div class="outline-empty"><i class="fas fa-file-text"></i><p>暂无大纲内容</p></div>';
                }
            } catch (error) {
                console.error('Failed to load latest outline:', error);
            }
        }

        async function loadOutlineVersion(versionId) {
            currentVersionId = versionId;
            console.log('Loading outline version:', versionId);
            
            document.querySelectorAll('.version-item').forEach(item => {
                item.classList.remove('active');
                if (parseInt(item.dataset.versionId) === versionId) {
                    item.classList.add('active');
                }
            });
            
            try {
                const data = await api.get(`/api/outline/version/${versionId}/`);
                console.log('Loaded outline version data:', data);
                
                if (data.success) {
                    const content = data.content || '';
                    
                    document.getElementById('outline-content').value = content;
                    document.getElementById('outline-preview').innerHTML = content ? marked.parse(content) : '<div class="outline-empty"><i class="fas fa-file-text"></i><p>暂无大纲内容</p></div>';
                    
                    if (data.version_number !== undefined) {
                        document.getElementById('outline-version').textContent = `v${data.version_number}`;
                        currentVersionNumber = data.version_number;
                    }
                    
                    const select = document.getElementById('version-select');
                    const selectedOption = select.querySelector(`option[value="${versionId}"]`);
                    if (selectedOption) {
                        select.options[select.selectedIndex].text = `当前版本 v${data.version_number}${data.is_finalized ? ' (定稿)' : ''}`;
                    }
                    
                    console.log('Messages in response:', data.messages);
                    if (data.messages && data.messages.length > 0) {
                        messages = data.messages.map(msg => ({
                            id: msg.id,
                            role: msg.role,
                            content: msg.content
                        }));
                        console.log('Rendering chat history with messages:', messages);
                        renderChatHistory();
                    } else {
                        console.log('No messages found, showing default');
                        messages = [];
                        const chatMessages = document.getElementById('chat-messages');
                        if (chatMessages) {
                            chatMessages.innerHTML = `
                                <div class="chat-message assistant">
                                    <div class="chat-message-avatar avatar-ai me-2">AI</div>
                                    <div class="chat-bubble chat-bubble-assistant">
                                        您好！我是您的大纲助手，可以为您提供大纲的生成和优化服务。
                                    </div>
                                </div>
                            `;
                        }
                    }
                    
                    updateButtons();
                } else {
                    console.log('API response not successful:', data);
                    document.getElementById('outline-preview').innerHTML = '<div class="outline-empty"><i class="fas fa-file-text"></i><p>暂无大纲内容</p></div>';
                }
            } catch (error) {
                console.error('Failed to load outline version:', error);
            }
        }

        function renderChatHistory() {
            const chatMessages = document.getElementById('chat-messages');
            if (!chatMessages) return;

            if (messages.length === 0) {
                chatMessages.innerHTML = `
                    <div class="chat-message assistant">
                        <div class="chat-message-avatar avatar-ai me-2">AI</div>
                        <div class="chat-bubble chat-bubble-assistant">
                            您好！我是您的大纲助手，可以为您提供大纲的生成和优化服务。
                        </div>
                    </div>
                `;
                return;
            }

            chatMessages.innerHTML = '';
            messages.forEach((msg, index) => {
                const div = document.createElement('div');
                div.className = `chat-message ${msg.role === 'user' ? 'user' : 'assistant'}`;
                div.dataset.messageIndex = index;
                
                const cleanedContent = msg.content
                    .replace(/════CONTENT_START════/g, '')
                    .replace(/════CONTENT_END════/g, '')
                    .replace(/════QUESTION_START════/g, '')
                    .replace(/════QUESTION_END════/g, '');
                
                if (msg.role === 'user') {
                    div.innerHTML = `
                        <input type="checkbox" class="chat-message-checkbox" onchange="toggleMessageSelect(${index})" ${selectedMessages.has(index) ? 'checked' : ''}>
                        <div class="chat-bubble chat-bubble-user">${escapeHtml(cleanedContent).replace(/\n/g, '<br>')}</div>
                        <div class="chat-message-avatar avatar-me ms-2">我</div>
                    `;
                } else {
                    div.innerHTML = `
                        <input type="checkbox" class="chat-message-checkbox" onchange="toggleMessageSelect(${index})" ${selectedMessages.has(index) ? 'checked' : ''}>
                        <div class="chat-message-avatar avatar-ai me-2">AI</div>
                        <div class="chat-bubble chat-bubble-assistant">${escapeHtml(cleanedContent).replace(/\n/g, '<br>')}</div>
                    `;
                }
                
                if (selectedMessages.has(index)) {
                    div.classList.add('selected');
                }
                
                chatMessages.appendChild(div);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
            updateDeleteButton();
        }

        const selectedMessages = new Set();
        let isSelectionMode = false;

        function enterSelectionMode() {
            isSelectionMode = true;
            
            document.getElementById('toggle-selection-btn').style.display = 'none';
            document.getElementById('selection-actions').style.display = 'flex';
            document.getElementById('context-count-select').style.display = 'none';
            
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.classList.add('selection-mode');
            
            renderChatHistory();
        }

        function cancelSelection() {
            isSelectionMode = false;
            selectedMessages.clear();
            
            document.getElementById('toggle-selection-btn').style.display = 'flex';
            document.getElementById('selection-actions').style.display = 'none';
            document.getElementById('context-count-select').style.display = 'flex';
            
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.classList.remove('selection-mode');
            
            renderChatHistory();
        }

        function toggleMessageSelect(index) {
            if (!isSelectionMode) return;
            
            if (selectedMessages.has(index)) {
                selectedMessages.delete(index);
            } else {
                selectedMessages.add(index);
            }
            
            const messageDiv = document.querySelector(`.chat-message[data-message-index="${index}"]`);
            if (messageDiv) {
                messageDiv.classList.toggle('selected');
            }
            
            updateDeleteButton();
        }

        function toggleSelectAll() {
            if (!isSelectionMode) return;
            
            const checkboxes = document.querySelectorAll('.chat-message-checkbox');
            const allChecked = selectedMessages.size === messages.length;
            
            if (allChecked) {
                selectedMessages.clear();
            } else {
                messages.forEach((_, index) => selectedMessages.add(index));
            }
            
            checkboxes.forEach((checkbox, index) => {
                checkbox.checked = !allChecked;
                const messageDiv = document.querySelector(`.chat-message[data-message-index="${index}"]`);
                if (messageDiv) {
                    messageDiv.classList.toggle('selected', !allChecked);
                }
            });
            
            updateDeleteButton();
        }

        function updateDeleteButton() {
            const deleteBtn = document.getElementById('delete-selected-btn');
            deleteBtn.disabled = selectedMessages.size === 0;
            deleteBtn.innerHTML = `<i class="fas fa-trash"></i> 删除选中`;
        }

        async function deleteSelectedMessages() {
            if (selectedMessages.size === 0) return;
            
            const count = selectedMessages.size;
            showModal('删除聊天记录', `确定要删除选中的 ${count} 条聊天记录吗？此操作不可恢复。`, function() {
                doDeleteSelectedMessages();
            });
        }

        async function doDeleteSelectedMessages() {
            const messageIds = [];
            selectedMessages.forEach(index => {
                const msg = messages[index];
                if (msg.id) {
                    messageIds.push(msg.id);
                }
            });
            
            if (messageIds.length === 0) {
                closeModal();
                showToast('没有可删除的消息', 'error');
                return;
            }
            
            try {
                const data = await api.postForm('/api/chat-history/delete/', `message_ids=${encodeURIComponent(JSON.stringify(messageIds))}`);
                if (data.success) {
                    const sortedIndices = Array.from(selectedMessages).sort((a, b) => b - a);
                    sortedIndices.forEach(index => {
                        messages.splice(index, 1);
                    });
                    
                    cancelSelection();
                    closeModal();
                    showToast(`成功删除 ${data.deleted_count} 条聊天记录`, 'success');
                } else {
                    closeModal();
                    showToast('删除失败', 'error');
                }
            } catch (error) {
                closeModal();
                showToast('网络错误，请重试', 'error');
            }
        }

        function updateButtons() {
            const content = document.getElementById('outline-content').value;
            const hasContent = content.trim() !== '';
            document.getElementById('save-btn').disabled = !hasContent;
            document.getElementById('save-as-btn').disabled = !hasContent;
            document.getElementById('finalize-btn').disabled = !hasContent;
        }

        function showEditMode() {
            document.getElementById('outline-content').classList.remove('d-none');
            document.getElementById('outline-preview').classList.add('d-none');
            document.getElementById('btn-edit').classList.add('active');
            document.getElementById('btn-preview').classList.remove('active');
        }

        function showPreviewMode() {
            const content = document.getElementById('outline-content').value;
            document.getElementById('outline-preview').innerHTML = marked.parse(content || '');
            document.getElementById('outline-content').classList.add('d-none');
            document.getElementById('outline-preview').classList.remove('d-none');
            document.getElementById('btn-preview').classList.add('active');
            document.getElementById('btn-edit').classList.remove('active');
        }

        function stripMarkdown(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '$1')
                .replace(/\*(.*?)\*/g, '$1')
                .replace(/__(.*?)__/g, '$1')
                .replace(/_(.*?)_/g, '$1')
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                .replace(/`([^`]+)`/g, '$1')
                .replace(/~~(.*?)~~/g, '$1');
        }

        function diffHighlight(oldContent, newContent) {
            const cleanOld = stripMarkdown(oldContent);
            const cleanNew = stripMarkdown(newContent);

            if (!cleanOld.trim()) {
                return newContent.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*/g, '');
            }

            const oldLines = cleanOld.split('\n');
            const newLines = cleanNew.split('\n');
            let result = '';
            let lineIndex = 0;

            while (lineIndex < newLines.length) {
                const newLine = newLines[lineIndex];
                const oldLine = oldLines[lineIndex];

                if (oldLine === newLine) {
                    result += newLine.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*/g, '') + '\n';
                } else if (!oldLine) {
                    const cleanLine = newLine.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*/g, '');
                    result += `**${cleanLine}**\n`;
                } else {
                    const cleanNewLine = newLine.replace(/\*\*(.*?)\*\*/g, '$1').replace(/\*/g, '');
                    const oldWords = oldLine.split(/(\s+)/);
                    const newWords = cleanNewLine.split(/(\s+)/);
                    let highlightedLine = '';
                    let wordIndex = 0;

                    while (wordIndex < newWords.length) {
                        const nw = newWords[wordIndex];
                        const ow = oldWords[wordIndex];
                        highlightedLine += (ow === nw) ? nw : `**${nw}**`;
                        wordIndex++;
                    }
                    result += highlightedLine + '\n';
                }
                lineIndex++;
            }
            return result.trim();
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            input.disabled = true;
            document.getElementById('send-message').disabled = true;

            const originalOutline = document.getElementById('outline-content').value;

            const chatMessages = document.getElementById('chat-messages');
            const userDiv = document.createElement('div');
            userDiv.className = 'chat-message user';
            userDiv.innerHTML = `
                <div class="chat-bubble chat-bubble-user">${escapeHtml(message)}</div>
                <div class="chat-message-avatar avatar-me ms-2">我</div>
            `;
            chatMessages.appendChild(userDiv);

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'chat-message assistant';
            loadingDiv.innerHTML = `
                <div class="chat-message-avatar avatar-ai me-2">AI</div>
                <div class="chat-bubble chat-bubble-assistant">
                    <i class="fas fa-spinner fa-spin"></i> 思考中...
                </div>
            `;
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            messages.push({ role: 'user', content: message });
            input.value = '';
            input.style.height = 'auto';

            const contextCount = document.getElementById('context-count-dropdown').value;
            let historyMessages = messages.slice(0, -1);
            
            if (contextCount !== 'all') {
                historyMessages = historyMessages.slice(-parseInt(contextCount) * 2);
            }

            try {
                const response = await fetch('/api/chat/outline/', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${api.getToken()}`,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: `project_id=${projectId}&version_number=${currentVersionNumber || 0}&message=${encodeURIComponent(message)}&current_outline=${encodeURIComponent(document.getElementById('outline-content').value)}&messages=${encodeURIComponent(JSON.stringify(historyMessages))}`
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                const CONTENT_START = '════CONTENT_START════';
                const CONTENT_END = '════CONTENT_END════';
                const QUESTION_START = '════QUESTION_START════';
                const QUESTION_END = '════QUESTION_END════';

                let rawTextBuffer = '';
                let isComplete = false;
                let parsedOutline = '';
                let parsedQuestion = '';

                let inOutlineSection = false;
                let inQuestionSection = false;
                let contentFinished = false;

                function initChatTyping() {
                    const chatTypingDiv = document.createElement('div');
                    chatTypingDiv.className = 'chat-bubble chat-bubble-assistant';
                    chatTypingDiv.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 输出中...';
                    loadingDiv.innerHTML = `<div class="chat-message-avatar avatar-ai me-2">AI</div>`;
                    loadingDiv.appendChild(chatTypingDiv);
                    return chatTypingDiv;
                }

                function streamToChat(chatTypingDiv, text) {
                    if (!chatTypingDiv) return;
                    chatTypingDiv.innerHTML = escapeHtml(text).replace(/\n/g, '<br>');
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }

                function switchToEditMode() {
                    document.getElementById('outline-content').classList.remove('d-none');
                    document.getElementById('outline-preview').classList.add('d-none');
                    document.getElementById('btn-edit').classList.add('active');
                    document.getElementById('btn-preview').classList.remove('active');
                }

                function switchToPreviewMode() {
                    document.getElementById('outline-preview').classList.remove('d-none');
                    document.getElementById('outline-content').classList.add('d-none');
                    document.getElementById('btn-preview').classList.add('active');
                    document.getElementById('btn-edit').classList.remove('active');
                }

                let chatTypingDiv = null;

                function processStream(buffer) {
                    if (buffer.includes(CONTENT_START) && !inOutlineSection && !contentFinished) {
                        inOutlineSection = true;
                        switchToEditMode();
                    }

                    if (inOutlineSection && !contentFinished) {
                        const csIdx = buffer.indexOf(CONTENT_START);
                        const ceIdx = buffer.indexOf(CONTENT_END);
                        const qsIdx = buffer.indexOf(QUESTION_START);

                        if (csIdx !== -1) {
                            let contentEndIdx = buffer.length;
                            
                            if (ceIdx !== -1 && ceIdx > csIdx) {
                                contentEndIdx = ceIdx;
                            } else if (qsIdx !== -1 && qsIdx > csIdx) {
                                contentEndIdx = qsIdx;
                            }

                            const contentStartIdx = csIdx + CONTENT_START.length;
                            const outlineContent = buffer.substring(contentStartIdx, contentEndIdx);
                            
                            const outlineTextarea = document.getElementById('outline-content');
                            outlineTextarea.value = outlineContent;
                            updateButtons();
                            
                            outlineTextarea.scrollTop = outlineTextarea.scrollHeight;

                            if (ceIdx !== -1 && ceIdx > csIdx) {
                                inOutlineSection = false;
                                contentFinished = true;
                                parsedOutline = outlineContent.trim();
                                
                                document.getElementById('outline-preview').innerHTML = marked.parse(parsedOutline);
                                switchToPreviewMode();
                            }
                        }
                    }

                    if (buffer.includes(QUESTION_START) && !inQuestionSection) {
                        inQuestionSection = true;
                        if (!chatTypingDiv) {
                            chatTypingDiv = initChatTyping();
                        }
                    }

                    if (inQuestionSection) {
                        const qsIdx = buffer.indexOf(QUESTION_START);
                        const qeIdx = buffer.indexOf(QUESTION_END);

                        if (qsIdx !== -1) {
                            const qStartIdx = qsIdx + QUESTION_START.length;
                            let qEndIdx = buffer.length;
                            
                            if (qeIdx !== -1 && qeIdx > qsIdx) {
                                qEndIdx = qeIdx;
                            }

                            const questionContent = buffer.substring(qStartIdx, qEndIdx);
                            
                            streamToChat(chatTypingDiv, questionContent);

                            if (qeIdx !== -1 && qeIdx > qsIdx) {
                                inQuestionSection = false;
                                parsedQuestion = questionContent.trim();
                            }
                        }
                    }
                }

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));

                                if (data.type === 'chunk') {
                                    rawTextBuffer += data.data || '';

                                    if (!chatTypingDiv) {
                                        initChatTyping();
                                    }

                                    processStream(rawTextBuffer);
                                } else if (data.type === 'complete') {
                                    isComplete = true;
                                    if (data.project_id) {
                                        currentProjectId = data.project_id;
                                    }
                                }
                            } catch (e) {}
                        }
                    }
                }

                if (parsedQuestion) {
                    messages.push({ role: 'assistant', content: parsedQuestion });
                }

                if (parsedOutline) {
                    const highlightedOutline = diffHighlight(originalOutline, parsedOutline);

                    document.getElementById('outline-content').value = parsedOutline;
                    updateButtons();

                    if (!document.getElementById('outline-preview').classList.contains('d-none')) {
                        document.getElementById('outline-preview').innerHTML = marked.parse(highlightedOutline);
                    }
                }

            } catch (error) {
                console.error('Error:', error);
            }

            input.disabled = false;
            document.getElementById('send-message').disabled = false;
        }

        function saveVersion(isNewVersion) {
            const content = document.getElementById('outline-content').value;
            if (!content.trim()) {
                showToast('请先输入大纲内容', 'error');
                return;
            }
            
            const label = isNewVersion ? '另存新版本' : '保存当前版本';
            const msg = isNewVersion 
                ? '将当前内容保存为新的版本，现有版本不受影响。' 
                : '将覆盖当前版本的内容。';
            
            showModal(label, msg, function() {
                doSaveVersion(isNewVersion);
            });
        }

        async function doSaveVersion(isNewVersion) {
            const content = document.getElementById('outline-content').value;
            
            try {
                const data = await api.postForm('/api/outline/version/save/', `project_id=${projectId}&content=${encodeURIComponent(content)}&messages=${encodeURIComponent(JSON.stringify(messages))}` + (isNewVersion ? '&new_version=true' : ''));
                if (data.success) {
                    closeModal();
                    showToast(`保存成功！版本号：v${data.version_number}`, 'success');
                    loadOutlineVersions();
                } else {
                    closeModal();
                    showToast(data.message || '保存失败', 'error');
                }
            } catch (error) {
                closeModal();
                showToast('网络错误，请重试', 'error');
            }
        }

        function confirmFinalize() {
            showModal('定稿版本', '确定要定稿这个大纲吗？定稿后可以继续创建新版本，但此版本将被锁定，且之前的定稿版本将被取消。', function() {
                finalizeOutline();
            });
        }

        async function finalizeOutline() {
            try {
                const data = await api.postForm('/api/outline/finalize/', `project_id=${projectId}${currentVersionId ? `&version_id=${currentVersionId}` : ''}`);
                if (data.success) {
                    closeModal();
                    showToast('定稿成功！', 'success');
                    loadOutlineVersions();
                } else {
                    closeModal();
                    showToast(data.message || '定稿失败', 'error');
                }
            } catch (error) {
                closeModal();
                showToast('网络错误，请重试', 'error');
            }
        }

        function deleteOutlineVersion(versionId) {
            const versionNum = document.querySelector(`.version-item[data-version-id="${versionId}"] .version-number`)?.textContent?.trim() || '此版本';
            showModal('删除版本', `确定要删除 ${versionNum} 吗？此操作不可恢复。`, function() {
                doDeleteOutlineVersion(versionId);
            });
        }

        async function doDeleteOutlineVersion(versionId) {
            try {
                const data = await api.postForm('/api/outline/delete/', `project_id=${projectId}&version_id=${versionId}`);
                if (data.success) {
                    closeModal();
                    showToast('删除成功！', 'success');
                    if (currentVersionId === versionId) {
                        currentVersionId = null;
                        document.getElementById('outline-content').value = '';
                        document.getElementById('outline-preview').innerHTML = '<div class="outline-empty"><i class="fas fa-file-text"></i><p>暂无大纲内容</p></div>';
                        document.getElementById('outline-version').textContent = '-';
                    }
                    loadOutlineVersions();
                } else {
                    closeModal();
                    showToast(data.message || '删除失败', 'error');
                }
            } catch (error) {
                closeModal();
                showToast('网络错误，请重试', 'error');
            }
        }

        function showModal(title, message, action) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('confirm-modal').classList.add('show');
            modalAction = action;
        }

        function closeModal() {
            document.getElementById('confirm-modal').classList.remove('show');
            modalAction = null;
        }

        function executeModalAction() {
            if (modalAction) {
                modalAction();
            }
        }

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-item toast-${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i>${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'toastSlideOut 0.3s ease forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function goBack() {
            window.location.href = `project.html?project_id=${projectId}`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/\n/g, '<br>');
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
