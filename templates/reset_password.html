<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Agent - 重置密码</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <h2><i class="fas fa-key me-2"></i>重置密码</h2>
            <p>通过邮箱找回您的账号</p>
        </div>

        <div id="errorAlert" class="alert alert-error mb-4" style="display: none;">
            <i class="fas fa-exclamation-circle me-2"></i><span id="errorMessage"></span>
        </div>

        <div id="successAlert" class="alert alert-success mb-4" style="display: none;">
            <i class="fas fa-check-circle me-2"></i><span id="successMessage"></span>
        </div>

        <form id="resetPasswordForm">
            <div class="mb-3">
                <label class="form-label fw-semibold">用户名</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" name="username" id="username" class="form-control" style="border-radius: 0 12px 12px 0;" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">注册邮箱</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" name="email" id="email" class="form-control" style="border-radius: 0 12px 12px 0;" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">新密码</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" id="password" class="form-control" style="border-radius: 0 12px 12px 0;" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">确认新密码</label>
                <div class="input-group">
                    <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password_confirm" id="password_confirm" class="form-control" style="border-radius: 0 12px 12px 0;" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mb-3" id="submitBtn">
                <i class="fas fa-key me-2"></i>重置密码
            </button>
        </form>

        <div class="text-center">
            <a href="/login/" class="text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i>返回登录
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            const successAlert = document.getElementById('successAlert');
            const successMessage = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');

            // 隐藏之前的提示
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            const data = {
                username: document.getElementById('username').value.trim(),
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                password_confirm: document.getElementById('password_confirm').value
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>提交中...';

            try {
                const response = await api.post('/api/reset-password/', data);

                if (response.success) {
                    successMessage.textContent = response.message || '密码重置成功，请使用新密码登录';
                    successAlert.style.display = 'block';
                    // 清空表单
                    document.getElementById('resetPasswordForm').reset();
                } else {
                    errorMessage.textContent = response.message || '重置密码失败';
                    errorAlert.style.display = 'block';
                }
            } catch (err) {
                const msg = (err.data && err.data.message) ? err.data.message : '请求失败，请稍后重试';
                errorMessage.textContent = msg;
                errorAlert.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-key me-2"></i>重置密码';
            }
        });
    </script>
</body>
</html>
