<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随手记 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/note.css" rel="stylesheet">
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <span id="loadingText">加载中...</span>
        </div>
    </div>

    <div class="page-header-wrapper">
        <div class="container">
            <div class="page-header-content">
                <button class="back-btn" onclick="goBack()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="header-main">
                    <h1 class="project-title" id="project-title">-</h1>
                    <p class="project-meta">
                        <i class="fas fa-feather"></i>
                        随手记 · 记录灵感碎片
                    </p>
                </div>
                <button class="btn btn-add-header" onclick="showAddModal()">
                    <i class="fas fa-plus"></i> 新增随手记
                </button>
            </div>
        </div>
    </div>

    <div class="container-fluid note-container">
        <div class="flex-container">
            <div class="note-sidebar-wrapper">
                <div class="note-sidebar">
                    <div class="sidebar-header">
                        <div class="search-box">
                            <input type="text" id="search-input" placeholder="搜索随手记..." onkeyup="searchNotes()">
                            <i class="fas fa-search"></i>
                        </div>
                    </div>

                    <div class="notes-list" id="notes-list">
                        <div class="empty-state">
                            <i class="fas fa-feather"></i>
                            <p>暂无随手记</p>
                            <p class="hint">点击上方按钮添加你的第一个灵感</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="note-content-wrapper">
                <div class="note-content">
                    <div class="content-header" id="content-header">
                        <div class="title-section">
                            <input type="text" id="note-title" class="title-input" placeholder="输入标题..." disabled>
                            <div class="update-time" id="update-time">
                                <i class="far fa-clock"></i>
                            </div>
                        </div>
                        <div class="actions-section">
                            <select id="status-select" class="status-select" disabled onchange="updateStatus()">
                                <option value="unused">📝 未使用</option>
                                <option value="used">✅ 已使用</option>
                                <option value="published">🚀 已发布</option>
                            </select>
                            <button class="btn btn-sm btn-outline-secondary" id="btn-edit" onclick="enterEditMode()" disabled>
                                <i class="fas fa-edit"></i> 编辑
                            </button>
                            <button class="btn btn-sm btn-outline-danger" id="btn-delete" onclick="deleteNote()" disabled>
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </div>
                    </div>

                    <div class="content-body">
                        <div class="placeholder-content" id="placeholder-content">
                            <div class="placeholder-icon">
                                <i class="fas fa-lightbulb"></i>
                            </div>
                            <p class="placeholder-title">选择一个随手记</p>
                            <p class="placeholder-subtitle">或点击右上角「新增随手记」开始记录</p>
                        </div>
                        <div class="note-editor" id="note-editor" style="display: none;">
                            <textarea id="note-content-textarea" class="content-textarea" placeholder="在这里写下你的灵感片段..." disabled oninput="updateWordCount()"></textarea>
                            <div class="content-footer">
                                <span class="word-count" id="word-count">0 字</span>
                                <div class="footer-actions">
                                    <button class="btn btn-secondary btn-magic" id="btn-ai-footer" onclick="aiPolishInEditMode()" disabled>
                                        <i class="fas fa-magic"></i> AI优化
                                    </button>
                                    <button class="btn btn-secondary" id="btn-cancel" onclick="cancelEdit()" style="display: none;">
                                        <i class="fas fa-times"></i> 取消
                                    </button>
                                    <button class="btn btn-primary" id="btn-save" onclick="saveNote()" style="display: none;">
                                        <i class="fas fa-check"></i> 保存
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5><i class="fas fa-plus-circle"></i>新增随手记</h5>
                <button class="btn-close" onclick="closeAddModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <label class="modal-label">灵感内容</label>
                <textarea id="new-content" class="modal-textarea" placeholder="记录你突然想到的小说片段、对话、情节..." oninput="updateNewWordCount()"></textarea>
                <div class="modal-footer-row">
                    <span class="modal-word-count" id="modal-word-count">0 字</span>
                    <button class="btn btn-magic btn-sm" id="btn-new-ai" onclick="aiPolishNewNote()">
                        <i class="fas fa-magic"></i> AI润色
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeAddModal()">取消</button>
                <button class="btn btn-primary" onclick="addNote()">
                    <i class="fas fa-plus"></i> 添加
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content small">
            <div class="modal-header">
                <h5><i class="fas fa-exclamation-triangle text-warning"></i>确认删除</h5>
                <button class="btn-close" onclick="closeConfirmModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body text-center">
                <p class="mb-3">确定要删除这条随手记吗？</p>
                <p class="text-muted small mb-0">删除后可联系管理员恢复</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeConfirmModal()">取消</button>
                <button class="btn btn-danger" onclick="confirmDelete()">
                    <i class="fas fa-trash"></i> 删除
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <div class="toast-container" id="toast-container"></div>

    <script src="/static/js/common.js"></script>
    <script src="/static/js/note.js"></script>
</body>
</html>
