<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内容管理 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #f9fafb;
        }
        .page-header-wrapper {
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(75, 85, 99, 0.5);
            padding: 1rem 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }
        .content-tabs {
            border-bottom: 1px solid #374151;
            background: rgba(31, 41, 55, 0.8);
            backdrop-filter: blur(12px);
        }
        .content-tabs .nav-link {
            color: #9ca3af;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 1rem 1.5rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .content-tabs .nav-link:hover {
            color: #d1d5db;
            background: transparent;
        }
        .content-tabs .nav-link.active {
            color: #818cf8;
            border-bottom-color: #818cf8;
            background: transparent;
        }
        .content-card {
            background: #1f2937;
            border-radius: 12px;
            border: 1px solid #374151;
            padding: 1rem;
            margin-bottom: 0.75rem;
            transition: all 0.2s;
            cursor: pointer;
        }
        .content-card:hover {
            border-color: #818cf8;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }
        .content-card.active {
            border-color: #818cf8;
            background: rgba(99, 102, 241, 0.08);
        }
        .version-badge {
            font-size: 0.75rem;
        }
        .content-preview {
            background: #111827;
            border-radius: 12px;
            border: 1px solid #374151;
            padding: 1.25rem;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
            line-height: 1.7;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #9ca3af;
        }
        .back-btn {
            color: #9ca3af;
            transition: color 0.2s;
            text-decoration: none;
        }
        .back-btn:hover {
            color: #818cf8;
        }
        .container {
            max-width: 1400px;
        }
        .badge-success {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.75rem;
        }
        .text-muted {
            color: #9ca3af !important;
        }
    </style>
</head>
<body>
    <div class="page-header-wrapper">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <a href="project.html?project_id={{project_id}}" class="back-btn">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                    <h5 class="mb-0"><i class="fas fa-folder-open me-2"></i>内容管理</h5>
                </div>
                <span class="text-muted" id="project-title">-</span>
            </div>
        </div>
    </div>

    <div class="content-tabs">
        <div class="container-fluid px-4">
            <ul class="nav nav-tabs" id="contentTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="outline-tab" data-bs-toggle="tab" data-bs-target="#outline-panel" type="button" role="tab">
                        <i class="fas fa-file-text me-1"></i> 大纲
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="volume-tab" data-bs-toggle="tab" data-bs-target="#volume-panel" type="button" role="tab">
                        <i class="fas fa-layer-group me-1"></i> 卷
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="chapter-tab" data-bs-toggle="tab" data-bs-target="#chapter-panel" type="button" role="tab">
                        <i class="fas fa-file-paragraph me-1"></i> 章节
                    </button>
                </li>
            </ul>
        </div>
    </div>

    <div class="container-fluid px-4 mt-4">
        <div class="tab-content" id="contentTabContent">
            <div class="tab-pane fade show active" id="outline-panel" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                        <h6 class="mb-3"><i class="fas fa-history me-2"></i>大纲版本</h6>
                        <div id="outline-list">
                            <div class="text-center py-4 text-muted">加载中...</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <h6 class="mb-3"><i class="fas fa-eye me-2"></i>大纲预览</h6>
                        <div class="content-preview" id="outline-preview">
                            <div class="empty-state">
                                <i class="fas fa-file-text" style="font-size: 3rem; opacity: 0.3;"></i>
                                <p class="mt-3">选择一个大纲版本查看内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="volume-panel" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                        <h6 class="mb-3"><i class="fas fa-history me-2"></i>卷版本</h6>
                        <div id="volume-list">
                            <div class="text-center py-4 text-muted">加载中...</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <h6 class="mb-3"><i class="fas fa-eye me-2"></i>卷内容预览</h6>
                        <div class="content-preview" id="volume-preview">
                            <div class="empty-state">
                                <i class="fas fa-layer-group" style="font-size: 3rem; opacity: 0.3;"></i>
                                <p class="mt-3">选择一个卷版本查看内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="chapter-panel" role="tabpanel">
                <div class="row">
                    <div class="col-md-4">
                        <h6 class="mb-3"><i class="fas fa-list me-2"></i>章节列表</h6>
                        <div id="chapter-list">
                            <div class="text-center py-4 text-muted">加载中...</div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <h6 class="mb-3"><i class="fas fa-eye me-2"></i>章节内容预览</h6>
                        <div class="content-preview" id="chapter-preview">
                            <div class="empty-state">
                                <i class="fas fa-file-paragraph" style="font-size: 3rem; opacity: 0.3;"></i>
                                <p class="mt-3">选择一个章节查看内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script>
        const projectId = new URLSearchParams(window.location.search).get('project_id');
        
        document.addEventListener('DOMContentLoaded', function() {
            loadProjectInfo();
            loadOutlineVersions();
        });
        
        document.getElementById('outline-tab').addEventListener('click', function() {
            loadOutlineVersions();
        });
        document.getElementById('volume-tab').addEventListener('click', function() {
            loadVolumeVersions();
        });
        document.getElementById('chapter-tab').addEventListener('click', function() {
            loadChapters();
        });
        
        async function loadProjectInfo() {
            const data = await api.get(`/api/projects/${projectId}/`);
            if (data.success) {
                document.getElementById('project-title').textContent = data.project.title;
            }
        }
        
        async function loadOutlineVersions() {
            const data = await api.get(`/api/projects/${projectId}/outline/versions/`);
            if (data.success) {
                const container = document.getElementById('outline-list');
                if (data.versions.length === 0) {
                    container.innerHTML = '<div class="text-center py-4 text-muted">暂无大纲版本</div>';
                    return;
                }
                container.innerHTML = data.versions.map(v => `
                    <div class="content-card" onclick="loadOutlineContent(${v.id})">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="fw-medium">v${v.version_number}</span>
                                ${v.is_finalized ? '<span class="badge-success ms-2">定稿</span>' : ''}
                            </div>
                            <small class="text-muted">${formatDate(v.updated_at)}</small>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        async function loadOutlineContent(id) {
            document.querySelectorAll('#outline-list .content-card').forEach(el => el.classList.remove('active'));
            event.currentTarget?.classList.add('active');
            
            const data = await api.get(`/api/outline/version/${id}/`);
            if (data.success) {
                const content = data.content || '<p class="text-muted">空内容</p>';
                document.getElementById('outline-preview').innerHTML = marked ? marked.parse(content) : content;
            }
        }
        
        async function loadVolumeVersions() {
            const data = await api.get(`/api/projects/${projectId}/volume/versions/`);
            if (data.success) {
                const container = document.getElementById('volume-list');
                if (data.versions.length === 0) {
                    container.innerHTML = '<div class="text-center py-4 text-muted">暂无卷版本</div>';
                    return;
                }
                container.innerHTML = data.versions.map(v => `
                    <div class="content-card" onclick="loadVolumeContent(${v.id})">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="fw-medium">v${v.version_number}</span>
                                ${v.is_finalized ? '<span class="badge-success ms-2">定稿</span>' : ''}
                            </div>
                            <small class="text-muted">${formatDate(v.updated_at)}</small>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        async function loadVolumeContent(id) {
            document.querySelectorAll('#volume-list .content-card').forEach(el => el.classList.remove('active'));
            event.currentTarget?.classList.add('active');
            
            const data = await api.get(`/api/volume/version/${id}/`);
            if (data.success) {
                const content = data.content || '<p class="text-muted">空内容</p>';
                document.getElementById('volume-preview').innerHTML = marked ? marked.parse(content) : content;
            }
        }
        
        async function loadChapters() {
            const data = await api.get(`/api/projects/${projectId}/chapters/`);
            if (data.success) {
                const container = document.getElementById('chapter-list');
                if (data.chapters.length === 0) {
                    container.innerHTML = '<div class="text-center py-4 text-muted">暂无章节</div>';
                    return;
                }
                container.innerHTML = data.chapters.map(c => `
                    <div class="content-card" onclick="loadChapterContent(${c.id})">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="fw-medium">第${c.chapter_number}章 ${c.title}</span>
                            </div>
                            <small class="text-muted">${formatDate(c.updated_at)}</small>
                        </div>
                    </div>
                `).join('');
            }
        }
        
        async function loadChapterContent(id) {
            document.querySelectorAll('#chapter-list .content-card').forEach(el => el.classList.remove('active'));
            event.currentTarget?.classList.add('active');
            
            const data = await api.get(`/api/chapters/${id}/`);
            if (data.success) {
                const content = data.content || '<p class="text-muted">空内容</p>';
                document.getElementById('chapter-preview').innerHTML = marked ? marked.parse(content) : content;
            }
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }
    </script>
</body>
</html>
