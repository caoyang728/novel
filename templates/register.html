<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Agent - 注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/register.css" rel="stylesheet">
</head>
<body>
    <div class="auth-card">
        <div class="auth-header">
            <h2><i class="fas fa-user-plus me-2"></i>注册账号</h2>
            <p>开启您的创作之旅</p>
        </div>
        
        <div id="error-message" class="alert alert-error mb-4 d-none">
            <i class="fas fa-exclamation-circle me-2"></i><span id="error-text"></span>
        </div>
        
        <div id="success-message" class="alert alert-success mb-4 d-none">
            <i class="fas fa-check-circle me-2"></i><span id="success-text"></span>
        </div>
        
        <form id="register-form">
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" id="username" class="form-control" style="border-radius: 0 12px 12px 0;" placeholder="用户名" required>
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="email" class="form-control" style="border-radius: 0 12px 12px 0;" placeholder="邮箱" required>
                    </div>
                </div>
            </div>
            
            <div class="form-text text-info small mb-3">
                <i class="fas fa-info-circle"></i> 邮箱是找回账号的唯一途径，请务必填写正确
            </div>
            
            <div class="row g-3 mb-4">
                <div class="col-6">
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" class="form-control" style="border-radius: 0 12px 12px 0;" placeholder="密码" required>
                    </div>
                </div>
                <div class="col-6">
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius: 12px 0 0 12px; background: #f8fafc;">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password_confirm" class="form-control" style="border-radius: 0 12px 12px 0;" placeholder="确认密码" required>
                    </div>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 mb-3" id="register-btn">
                <i class="fas fa-user-plus me-2"></i>注册
            </button>
        </form>
        
        <div class="text-center">
            <a href="login.html" class="text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i>返回登录
            </a>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/register.js"></script>
</body>
</html>
