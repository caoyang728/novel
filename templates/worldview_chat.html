<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界观聊天构建 - AI 小说创作工作台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/worldview_chat.css" rel="stylesheet">
</head>
<body>
    <!-- 使用 common.css 统一页面头部 -->
    <div class="page-header">
        <div class="page-header-inner">
            <button class="back-btn" onclick="goBack()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-title-area">
                <div class="header-title">
                    <i class="fas fa-globe text-purple"></i> 世界观构建
                </div>
                <p class="header-subtitle">通过AI对话构建完整的世界观体系</p>
            </div>
            <div class="header-actions"></div>
        </div>
    </div>

    <!-- 使用 common.css page-content -->
    <div class="page-content">
        <div class="split-view">
            <!-- 左侧：世界观内容 -->
            <div class="left-panel">
                <div class="worldview-card">
                    <div class="card-header">
                        <h5><i class="fas fa-book-open me-2"></i>世界观内容<span class="category-badge cat-worldview" id="current-category">未分类</span></h5>
                        <div class="btn-group-toggle d-flex gap-1">
                            <button class="btn" id="btn-edit" onclick="showEditMode()">编辑</button>
                            <button class="btn active" id="btn-preview" onclick="showPreviewMode()">预览</button>
                        </div>
                    </div>
                    <textarea id="wv-textarea" class="d-none" placeholder="输入或通过AI对话生成世界观内容..."></textarea>
                    <div class="worldview-card-body" id="wv-preview">
                        <div class="worldview-empty">
                            <i class="fas fa-globe-americas"></i>
                            <p>通过AI对话构建小说世界观</p>
                            <p class="mt-2" style="font-size:0.8rem;">试试发送："帮我设定一个修仙世界的基本框架"</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：AI 聊天 -->
            <div class="right-panel">
                <div class="chat-card">
                    <div class="card-header">
                        <h5><i class="fas fa-magic me-2 text-purple"></i>世界观助手</h5>
                        <div class="chat-card-header-actions" id="chat-actions">
                            <div class="selection-actions" id="selection-actions" style="display: none;">
                                <button class="btn btn-cancel-selection" id="cancel-selection-btn" onclick="cancelSelection()">
                                    <i class="fas fa-times"></i> 取消
                                </button>
                                <button class="btn btn-delete-selected" id="delete-selected-btn" onclick="deleteSelectedMessages()" disabled>
                                    <i class="fas fa-trash"></i> 删除选中
                                </button>
                                <button class="btn btn-select-all" id="select-all-btn" onclick="toggleSelectAll()">
                                    <i class="fas fa-check-square"></i> 全选
                                </button>
                            </div>
                            <div class="context-count-select" id="context-count-select">
                                <label class="context-count-label">上下文:</label>
                                <select class="context-count-dropdown" id="context-count-dropdown">
                                    <option value="1">1组</option>
                                    <option value="2">2组</option>
                                    <option value="5">5组</option>
                                    <option value="10" selected>10组</option>
                                    <option value="20">20组</option>
                                </select>
                            </div>
                            <button class="btn-toggle-selection" id="toggle-selection-btn" onclick="enterSelectionMode()">
                                <i class="fas fa-edit"></i> 选择
                            </button>
                        </div>
                    </div>
                    <div class="chat-card-body" id="chat-messages">
                        <div class="chat-message assistant">
                            <div class="chat-message-avatar avatar-wv me-2">WV</div>
                            <div class="chat-bubble chat-bubble-assistant">
                                你好！我是你的世界观构建助手。<br><br>
                                告诉我你想创作什么类型的故事（玄幻、科幻、都市、末世、古风等），以及大致的世界背景构想，我会一步步帮你搭建完整的世界观体系。
                            </div>
                        </div>
                    </div>
                    <div class="chat-card-footer">
                        <div class="chat-input-wrap">
                            <textarea id="chat-input" rows="3" placeholder="描述您想要的世界观...（Shift+Enter 换行，Enter 发送）"></textarea>
                            <button class="btn-send-purple" id="send-btn" onclick="sendMessage()">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/worldview_chat.js"></script>
</body>
</html>
