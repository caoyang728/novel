<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/project.css" rel="stylesheet">
</head>
<body>
    <div class="page-header-wrapper">
        <div class="container">
            <div class="page-header-content">
                <button class="back-btn" id="backButton">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="header-main">
                    <h1 class="project-title" id="project-title">-</h1>
                    <p class="project-meta" id="project-description">暂无描述</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-edit" onclick="editProject()">
                        <i class="fas fa-edit me-1"></i> 编辑
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="container main-container">
        <div class="section-title">项目统计</div>
        <div class="row g-3 mb-5">
            <div class="col-md-2 col-sm-4">
                <div class="stat-card volume">
                    <div class="stat-icon volume">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <div class="stat-value" id="volume-count">0</div>
                    <div class="stat-label">卷数量</div>
                </div>
            </div>
            <div class="col-md-2 col-sm-4">
                <div class="stat-card chapter">
                    <div class="stat-icon chapter">
                        <i class="fas fa-list-ul"></i>
                    </div>
                    <div class="stat-value" id="chapter-count">0</div>
                    <div class="stat-label">总章节数</div>
                </div>
            </div>
            <div class="col-md-2 col-sm-4">
                <div class="stat-card summary">
                    <div class="stat-icon summary">
                        <i class="fas fa-file-text"></i>
                    </div>
                    <div class="stat-value" id="chapter-summary">0</div>
                    <div class="stat-label">章节概要</div>
                </div>
            </div>
            <div class="col-md-2 col-sm-4">
                <div class="stat-card content">
                    <div class="stat-icon content">
                        <i class="fas fa-file-lines"></i>
                    </div>
                    <div class="stat-value" id="chapter-content">0</div>
                    <div class="stat-label">正文内容</div>
                </div>
            </div>
            <div class="col-md-2 col-sm-4">
                <div class="stat-card finalized">
                    <div class="stat-icon finalized">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-value" id="chapter-finalized">0</div>
                    <div class="stat-label">定稿章节</div>
                </div>
            </div>
            <div class="col-md-2 col-sm-4">
                <div class="stat-card published">
                    <div class="stat-icon published">
                        <i class="fas fa-globe"></i>
                    </div>
                    <div class="stat-value" id="chapter-published">0</div>
                    <div class="stat-label">发布章节</div>
                </div>
            </div>
        </div>

        <div class="section-title">功能入口</div>
        <div class="row g-4 mb-5">
            <div class="col-md-6">
                <div class="action-card" onclick="openOutlineBuilder()">
                    <div class="action-icon sky">
                        <i class="fas fa-wand-magic-sparkles"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">大纲优化</div>
                        <div class="action-desc">编辑和优化小说大纲，支持AI辅助生成</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="action-card" onclick="openVolumeGenerator()">
                    <div class="action-icon purple">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">生成卷</div>
                        <div class="action-desc">根据大纲自动生成卷结构</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="action-card" onclick="openChapterGenerator()">
                    <div class="action-icon green">
                        <i class="fas fa-file-lines"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">生成章节</div>
                        <div class="action-desc">根据卷内容自动生成章节大纲</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="action-card" onclick="openContentManager()">
                    <div class="action-icon amber">
                        <i class="fas fa-folder-open"></i>
                    </div>
                    <div class="action-content">
                        <div class="action-title">内容管理</div>
                        <div class="action-desc">查看和管理所有大纲、卷、章节内容</div>
                    </div>
                    <div class="action-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="section-title">最近活动</div>
        <div class="activity-card">
            <div class="activity-header">
                <i class="fas fa-clock"></i>
                <h5>活动记录</h5>
            </div>
            <div class="activity-body">
                <div class="empty-activity">
                    <div class="empty-activity-icon">
                        <i class="fas fa-inbox"></i>
                    </div>
                    <p>暂无活动记录</p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editProjectModal" tabindex="-1" aria-labelledby="editProjectModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editProjectModalLabel">
                        <i class="fas fa-edit"></i>
                        编辑项目
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editProjectForm">
                        <div class="mb-3">
                            <label class="form-label">项目名称</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="edit-title" required>
                                <button type="button" class="btn btn-outline-secondary" id="ai-generate-btn">
                                    <i class="fas fa-magic"></i> AI生成
                                </button>
                            </div>
                            <div id="title-suggestions-container" style="display: none;">
                                <div class="title-suggestions">
                                    <div class="title-suggestions-header">
                                        <i class="fas fa-lightbulb"></i>
                                        AI推荐的项目名称
                                    </div>
                                    <div class="title-suggestions-list" id="title-suggestions-list">
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">项目描述</label>
                            <textarea class="form-control" id="edit-description" rows="4"></textarea>
                            <!-- <div class="form-text text-muted mt-1">
                                <i class="fas fa-info-circle"></i>
                                点击"AI生成"按钮可根据大纲自动生成项目名和描述
                            </div> -->
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times"></i>
                        取消
                    </button>
                    <button type="button" class="btn btn-primary" onclick="saveProjectEdit()">
                        <i class="fas fa-save"></i>
                        保存
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmModalLabel">提示</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p id="confirmModalMessage"></p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="confirmModalBtn">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/project.js"></script>
</body>
</html>
