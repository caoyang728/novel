<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Agent - Token统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/layout.css" rel="stylesheet">
    <link href="/static/css/token_usage.css" rel="stylesheet">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-feather-alt me-2"></i>Novel Agent</h2>
        </div>
        
        <ul class="nav-links">
            <li><a href="/index.html"><i class="fas fa-book"></i>我的书架</a></li>
            <li><a href="token_usage.html" class="active"><i class="fas fa-chart-line"></i>Token统计</a></li>
            <li><a href="llm_config.html"><i class="fas fa-cog"></i>LLM配置</a></li>
        </ul>
        
        <div class="user-info">
            <div class="username" id="username">-</div>
            <div class="token-usage" id="token-usage">今日 Token: -</div>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-chart-line me-3"></i>Token统计</h1>
            <p>查看您的Token使用情况和缓存命中统计</p>
        </div>

        <div class="d-flex gap-2 mb-4">
            <button class="btn btn-outline-primary active" onclick="loadStats('today', this)">今日</button>
            <button class="btn btn-outline-primary" onclick="loadStats('week', this)">本周</button>
            <button class="btn btn-outline-primary" onclick="loadStats('month', this)">本月</button>
            <button class="btn btn-outline-primary" onclick="loadStats('all', this)">全部</button>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">-</div>
                    <div class="stat-label">总Token消耗</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card hit">
                    <div class="stat-value" id="stat-hit">-</div>
                    <div class="stat-label">输入命中</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card miss">
                    <div class="stat-value" id="stat-miss">-</div>
                    <div class="stat-label">输入未命中</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card output">
                    <div class="stat-value" id="stat-output">-</div>
                    <div class="stat-label">输出Token</div>
                </div>
            </div>
        </div>

        <div class="content-card">
            <h5><i class="fas fa-list me-2"></i>详细记录</h5>
            <p class="text-muted small mb-3">仅显示最近100条记录</p>
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>项目</th>
                            <th>任务类型</th>
                            <th>总计</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="logs-table-body">
                        <tr>
                            <td colspan="5" class="text-center text-muted py-4">加载中...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="content-card">
            <h5><i class="fas fa-book me-2"></i>按项目统计</h5>
            <div id="project-stats">
                <p class="text-center text-muted py-4">加载中...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/js/token_usage.js"></script>
</body>
</html>
