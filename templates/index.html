<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novel Agent - 书架</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/layout.css" rel="stylesheet">
    <link href="/static/css/index.css" rel="stylesheet">
</head>
<body>
    <div class="loading-overlay" id="createProjectModal">
        <div class="loading-content">
            <div class="custom-modal">
                <div class="custom-modal-header">
                    <h5><i class="fas fa-plus me-2"></i>创建项目</h5>
                </div>
                <div class="custom-modal-body">
                    <div class="mb-3">
                        <label class="form-label">书名</label>
                        <input type="text" id="create-project-title" class="form-control" placeholder="输入书名">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">描述</label>
                        <textarea id="create-project-description" class="form-control" rows="4" placeholder="输入项目描述（AI完善需要此内容）"></textarea>
                    </div>
                </div>
                <div class="custom-modal-footer">
                    <button class="btn btn-outline-primary" id="ai-enhance-btn" onclick="aiEnhanceCreateProject()" disabled>
                        <i class="fas fa-sparkles me-1"></i>AI优化
                    </button>
                    <button class="btn btn-secondary" onclick="closeCreateProjectModal()">取消</button>
                    <button class="btn btn-primary" onclick="confirmCreateProject()">确认</button>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="editProjectModal">
        <div class="loading-content">
            <div class="custom-modal">
                <div class="custom-modal-header">
                    <h5><i class="fas fa-edit me-2"></i>编辑项目</h5>
                </div>
                <div class="custom-modal-body">
                    <div class="mb-3">
                        <label class="form-label">项目名称</label>
                        <input type="text" id="edit-project-title" class="form-control" placeholder="输入项目名称">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">项目简介</label>
                        <textarea id="edit-project-description" class="form-control" rows="3" placeholder="输入项目简介"></textarea>
                    </div>
                </div>
                <div class="custom-modal-footer">
                    <button class="btn btn-outline-primary" id="ai-enhance-edit-btn" onclick="aiEnhanceEditProject()">
                        <i class="fas fa-sparkles me-1"></i>AI优化
                    </button>
                    <button class="btn btn-secondary" onclick="closeEditProjectModal()">取消</button>
                    <button class="btn btn-primary" onclick="saveProjectEdit()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2><i class="fas fa-feather-alt me-2"></i>Novel Agent</h2>
        </div>
        
        <ul class="nav-links">
            <li><a href="index.html" class="active"><i class="fas fa-book"></i>我的书架</a></li>
            <li><a href="token.html"><i class="fas fa-chart-line"></i>Token统计</a></li>
            <li><a href="llm_config.html"><i class="fas fa-cog"></i>LLM配置</a></li>
        </ul>
        
        <div class="user-info">
            <div class="username" id="username">-</div>
            <div class="token-usage" id="token-usage">今日 Token: -</div>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </button>
        </div>
    </div>

    <div class="main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <div>
                <h1><i class="fas fa-book me-3"></i>我的书架</h1>
                <p>管理您的小说创作项目</p>
            </div>
            <button class="add-project-btn" onclick="openCreateProjectModal()">
                <i class="fas fa-plus me-2"></i>创建项目
            </button>
        </div>

        <div class="row g-4" id="projects-container">
            <div class="col-md-12">
                <div class="empty-state">
                    <i class="fas fa-book-open"></i>
                    <p>加载中...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/index.js"></script>
</body>
</html>
