<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大纲构建 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/outline.css" rel="stylesheet">
</head>
<body class="page-full-height">
    <div class="page-header">
        <div class="page-header-inner">
            <button class="back-btn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-title-area">
                <h1 class="header-title">大纲构建</h1>
                <p class="header-subtitle" id="project-title">-</p>
            </div>
            <div class="header-actions">
                <select class="form-select form-select-sm" id="version-select" style="width: 180px;">
                    <option value="">选择版本...</option>
                </select>
                <button class="btn-success" onclick="saveVersion(false)" id="save-btn" disabled>
                    <i class="fas fa-save"></i> 保存当前
                </button>
                <button class="btn-success" onclick="saveVersion(true)" id="save-as-btn" disabled>
                    <i class="fas fa-file-plus"></i> 另存新版
                </button>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="split-view">
            <div class="middle-panel">
                <div class="outline-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2">
                            <h5><i class="fas fa-edit me-2"></i>大纲内容</h5>
                            <span class="badge badge-secondary text-sm" id="outline-version">-</span>
                            <span class="badge badge-info text-sm" id="outline-word-count">0 字</span>
                            <button class="btn-danger btn-sm" onclick="confirmDeleteVersion()" id="delete-version-btn" disabled>
                                <i class="fas fa-trash"></i> 删除版本
                            </button>
                            <button class="btn-success btn-sm" onclick="confirmLock()" id="lock-btn" disabled>
                                <i class="fas fa-lock"></i> 锁定
                            </button>
                        </div>
                        <div class="d-flex align-items-center gap-1">
                            
                            <div class="outline-mode-toggle d-flex gap-1">
                                <button class="btn-cancel btn-sm" id="btn-edit" onclick="showEditMode()">编辑</button>
                                <button class="btn-save btn-sm active" id="btn-preview" onclick="showPreviewMode()">预览</button>
                            </div>
                        </div>
                    </div>
                    <div class="outline-card-body">
                        <textarea id="outline-content" class="d-none" placeholder="在此输入您的小说构思，AI将为您构建大纲..." maxlength="200000"></textarea>
                        <div id="outline-preview" class="markdown-content"></div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="chat-card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5><i class="fas fa-robot me-2"></i>AI助手</h5>
                        <div class="chat-card-header-actions" id="chat-actions">
                            <div class="selection-actions" id="selection-actions" style="display: none;">
                                <button class="btn-cancel btn-sm" id="cancel-selection-btn" onclick="cancelSelection()">
                                    <i class="fas fa-times"></i> 取消
                                </button>
                                <button class="btn-danger btn-sm" id="delete-selected-btn" onclick="deleteSelectedMessages()" disabled>
                                    <i class="fas fa-trash"></i> 删除选中
                                </button>
                                <button class="btn-ai btn-sm" id="select-all-btn" onclick="toggleSelectAll()">
                                    <i class="fas fa-check-square"></i> 全选
                                </button>
                            </div>
                            <div class="context-count-select" id="context-count-select">
                                <label class="context-count-label">上下文:</label>
                                <select class="context-count-dropdown" id="context-count-dropdown">
                                    <option value="1">1组</option>
                                    <option value="2">2组</option>
                                    <option value="5">5组</option>
                                    <option value="10" selected>10组</option>
                                    <option value="20">20组</option>
                                    <option value="all">全部</option>
                                </select>
                            </div>
                            <button class="btn-toggle-selection" id="toggle-selection-btn" onclick="enterSelectionMode()">
                                <i class="fas fa-edit"></i> 选择
                            </button>
                        </div>
                    </div>
                    <div class="chat-card-body" id="chat-messages">
                        <div class="chat-message assistant">
                            <div class="chat-message-avatar avatar-ai me-2">AI</div>
                            <div class="chat-bubble chat-bubble-assistant">
                                您好！我是您的大纲助手，可以为您提供大纲的生成和优化服务。
                            </div>
                        </div>
                    </div>
                    <div class="chat-card-footer">
                        <div class="chat-input-wrap">
                            <textarea id="chat-input" rows="3" placeholder="输入您的修改意见...（Shift+Enter 换行，Enter 发送）" maxlength="5000"></textarea>
                            <button class="btn-send" id="send-message">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="dialog-overlay" id="confirm-modal">
        <div class="dialog dialog-sm">
            <div class="dialog-header">
                <h5 id="modal-title">确认操作</h5>
                <button class="btn-close" onclick="closeModal()"></button>
            </div>
            <div class="dialog-body">
                <p id="modal-message">确定要执行此操作吗？</p>
            </div>
            <div class="dialog-footer">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-success" id="modal-confirm-btn" onclick="executeModalAction()">确认</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/outline.js"></script>
</body>
</html>
