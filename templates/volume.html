<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卷管理 - 小说创作助手</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/volume.css" rel="stylesheet">
</head>
<body>
    <div class="main-content-full">
        <div class="content-header">
            <div class="header-left">
                <button class="btn btn-outline-secondary btn-back">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div>
                    <h5>卷管理</h5>
                    <span class="badge badge-info" id="project-title">-</span>
                </div>
            </div>
            <div class="btn-group-custom">
                <div class="version-select-group">
                    <label>大纲版本</label>
                    <select class="form-select form-select-sm" id="outline-select">
                        <option value="">请选择大纲版本</option>
                    </select>
                </div>
                <div class="version-select-group">
                    <label>卷版本</label>
                    <select class="form-select form-select-sm" id="volume-version-select">
                        <option value="">请选择卷版本</option>
                    </select>
                </div>

                <button class="btn btn-primary" onclick="saveVersion()" id="save-as-btn" disabled data-msg="将所有卷保存为一个新版本，当前版本内容不受影响。">
                    <i class="fas fa-copy"></i> 另存新版
                </button>
                <button class="btn btn-outline-gradient btn-finalize" onclick="finalizeVersion()" id="finalize-btn" disabled>
                    <i class="fas fa-lock"></i> 版本锁定
                </button>
            </div>
        </div>

        <div class="three-column-view">
            <div class="left-column">
                <div class="volume-list-card">
                    <div class="card-header">
                        <div class="d-flex align-items-center gap-2">
                            <h5><i class="fas fa-book me-2"></i>卷列表</h5>
                            <span class="badge bg-primary text-white" id="volume-count">0 卷</span>
                        </div>
                        <button class="btn-add-volume" id="add-volume-btn" onclick="addNewVolume()" style="display: none;">
                            <i class="fas fa-plus"></i> 新增卷
                        </button>
                    </div>
                    <div class="card-body" id="volume-list">
                        <div class="volume-empty">
                            <button class="btn btn-gradient-success generate-btn-center" onclick="generateVolumes()" id="generate-btn" disabled style="display:none;">
                                <i class="fas fa-magic"></i> AI生成卷
                            </button>
                            <p>暂无卷, 选择大纲版本并生成卷</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="middle-column">
                <div class="volume-detail-card">
                    <div class="card-header">
                        <h5><i class="fas fa-file-alt me-2"></i>卷详情</h5>
                        <div class="detail-header-actions" id="detail-actions" style="display: none;">
                            <button class="detail-btn detail-btn-lock" onclick="lockVolume()" id="lock-volume-btn">
                                <i class="fas fa-lock"></i> 锁定
                            </button>
                            <button class="detail-btn detail-btn-edit" onclick="openEditModal()" id="edit-volume-btn">
                                <i class="fas fa-pencil"></i> 编辑
                            </button>
                            <button class="detail-btn detail-btn-delete" onclick="deleteVolume()" id="delete-volume-btn">
                                <i class="fas fa-trash"></i> 删除
                            </button>
                        </div>
                    </div>
                    <div class="card-body" id="volume-detail">
                        <div class="detail-empty">
                            <i class="fas fa-search"></i>
                            <p>请从左侧选择一个卷</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="chat-card">
                    <div class="card-header">
                        <h5><i class="fas fa-robot me-2"></i>AI卷助手</h5>
                        <div class="chat-card-header-actions" id="chat-actions">
                            <div class="selection-actions" id="selection-actions" style="display: none;">
                                <button class="btn btn-cancel-selection" id="cancel-selection-btn" onclick="cancelSelection()">
                                    <i class="fas fa-times"></i> 取消
                                </button>
                                <button class="btn btn-delete-selected" id="delete-selected-btn" onclick="deleteSelectedMessages()" disabled>
                                    <i class="fas fa-trash"></i> 删除选中
                                </button>
                                <button class="btn btn-select-all" id="select-all-btn" onclick="toggleSelectAll()">
                                    <i class="fas fa-check-square"></i> 全选
                                </button>
                            </div>
                            <div class="context-count-select" id="context-count-select">
                                <label class="context-count-label">上下文:</label>
                                <select class="context-count-dropdown" id="context-count-dropdown">
                                    <option value="1">1组</option>
                                    <option value="2">2组</option>
                                    <option value="5">5组</option>
                                    <option value="10" selected>10组</option>
                                    <option value="20">20组</option>
                                    <option value="all">全部</option>
                                </select>
                            </div>
                            <button class="btn-toggle-selection" id="toggle-selection-btn" onclick="enterSelectionMode()">
                                <i class="fas fa-edit"></i> 选择
                            </button>
                        </div>
                    </div>
                    <div class="card-body" id="chat-messages">
                        <div class="chat-message assistant">
                            <div class="chat-message-avatar avatar-ai me-2">AI</div>
                            <div class="chat-bubble chat-bubble-assistant">
                                您好！我是卷生成助手。请先选择大纲版本，然后点击"生成卷"按钮，我将根据大纲内容为您生成卷结构。
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="chat-input-wrap">
                            <textarea id="chat-input" rows="3" placeholder="输入您的想法...（Shift+Enter 换行，Enter 发送）"></textarea>
                            <button class="btn-send" onclick="sendMessage()">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h5 id="modal-title">确认操作</h5>
                <button class="btn btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p id="modal-message">确定要执行此操作吗？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" id="modal-confirm-btn" onclick="executeModalAction()">确认</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content edit-modal-content">
            <div class="modal-header">
                <h5 id="edit-modal-title"><i class="fas fa-pencil me-2"></i>编辑卷</h5>
                <button class="btn btn-close" onclick="closeEditModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-volume-index">
                <div class="edit-form-row">
                    <div class="edit-form-group edit-form-group-sm">
                        <label class="form-label">卷编号</label>
                        <input type="number" id="edit-volume-number" min="1" placeholder="如: 1">
                    </div>
                    <div class="edit-form-group edit-form-group-lg">
                        <label class="form-label">卷标题</label>
                        <input type="text" id="edit-title" placeholder="输入卷标题">
                    </div>
                    <div class="edit-form-group edit-form-group-sm">
                        <label class="form-label">预估章节数</label>
                        <input type="number" id="edit-chapter-count" min="0" placeholder="如: 10">
                    </div>
                </div>
                <div class="edit-form-group">
                    <label class="form-label">卷概述</label>
                    <textarea id="edit-summary" placeholder="输入卷的内容概述..."></textarea>
                </div>
                <div class="edit-form-group">
                    <label class="form-label">卷大纲 <span class="form-label-hint">支持Markdown格式</span></label>
                    <div id="edit-outline-editor"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary btn-ai-optimize" onclick="aiOptimizeVolume()" id="ai-optimize-btn">
                    <i class="fas fa-magic"></i> AI优化
                </button>
                <button class="btn btn-primary" onclick="saveEditVolume()">保存</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/volume.js"></script>
</body>
</html>
