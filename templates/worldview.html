<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界观管理 - AI 小说创作工作台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/css/common.css" rel="stylesheet">
    <link href="/static/css/worldview.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
    <div class="page-header">
        <div class="page-header-inner">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="header-title-area">
                <h1 class="header-title" id="pageTitle">
                    <i class="fas fa-globe-americas me-2"></i>世界观管理
                    <span id="projectNameDisplay" class="header-subtitle"></span>
                </h1>
                <p class="header-subtitle" id="pageSubtitle">版本: <span id="worldVersionDisplay">v1</span></p>
            </div>
            <div class="header-actions">
                <a href="#" id="chatBuildBtn" class="btn-secondary me-2">
                    <i class="fas fa-comments me-1"></i> 通过聊天构建
                </a>
                <!-- <button class="btn-primary" onclick="saveSetting()">
                    <i class="fas fa-save me-1"></i> 保存基本信息 待实现
                </button> -->
            </div>
        </div>
    </div>

    <div class="page-content">
        <div id="mainContent" class="workspace-layout">
            <div class="workspace-sidebar">
                <div class="sidebar-tabs">
                    <button class="sidebar-tab active" onclick="showTab('overview')">
                        <i class="fas fa-home"></i>
                        <span>故事设定</span>
                    </button>
                    <button class="sidebar-tab" onclick="showTab('foundation')">
                        <i class="fas fa-globe"></i>
                        <span>世界基础</span>
                    </button>
                    <button class="sidebar-tab" onclick="showTab('power')">
                        <i class="fas fa-bolt"></i>
                        <span>力量体系</span>
                    </button>
                    <button class="sidebar-tab" onclick="showTab('races')">
                        <i class="fas fa-users"></i>
                        <span>种族族群</span>
                    </button>
                    <button class="sidebar-tab" onclick="showTab('society')">
                        <i class="fas fa-building"></i>
                        <span>社会结构</span>
                    </button>
                    <button class="sidebar-tab" onclick="showTab('culture')">
                        <i class="fas fa-palette"></i>
                        <span>文化人文</span>
                    </button>
                    <button class="sidebar-tab" onclick="showTab('history')">
                        <i class="fas fa-history"></i>
                        <span>历史进程</span>
                    </button>
                    <button class="sidebar-tab" onclick="showTab('special')">
                        <i class="fas fa-star"></i>
                        <span>特殊规则</span>
                    </button>
                    <hr class="sidebar-divider">
                    <button class="sidebar-tab" onclick="showTab('deepening')">
                        <i class="fas fa-comments"></i>
                        <span>问答深化</span>
                    </button>
                    <button class="sidebar-tab" onclick="showTab('consistency')">
                        <i class="fas fa-check-double"></i>
                        <span>一致性</span>
                    </button>
                    <button class="sidebar-tab" onclick="showTab('references')">
                        <i class="fas fa-book"></i>
                        <span>参考资料</span>
                    </button>
                    <button class="sidebar-tab" onclick="showTab('assets')">
                        <i class="fas fa-folder-open"></i>
                        <span>素材/版本</span>
                    </button>
                </div>
            </div>

            <div class="workspace-main">
                <div id="tab-overview" class="tab-content active">
                    <div class="card-section card-section-with-actions">
                        <div class="d-flex gap-4 card-section-body">
                            <div class="section-sidebar">
                                <button class="section-nav-btn active" onclick="showSettingSection('identity')">世界标识</button>
                                <button class="section-nav-btn" onclick="showSettingSection('position')">核心定位</button>
                                <button class="section-nav-btn" onclick="showSettingSection('overview')">世界概述</button>
                                <button class="section-nav-btn" onclick="showSettingSection('conflict')">核心冲突</button>
                            </div>

                            <div class="section-content flex-fill">
                                <h4 id="setting-title" class="section-title">世界标识</h4>
                                <div id="setting-identity" class="setting-section">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">世界名称</label>
                                            <input type="text" class="form-control" id="worldName" placeholder="输入世界名称" oninput="updateExpandBtn()">
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">小说类型</label>
                                            <input type="hidden" id="genreSelect" value="">
                                            <div class="dropdown genre-dropdown">
                                                <button class="form-select dropdown-toggle text-start" type="button" id="genreDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false">
                                                    <span id="genreDropdownLabel">请选择小说类型</span>
                                                </button>
                                                <ul class="dropdown-menu" aria-labelledby="genreDropdownBtn" id="genreDropdownMenu">
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div id="setting-position" class="setting-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">世界身份 / 类型气质</label>
                                            <textarea class="form-control" rows="10" id="worldIdentity" placeholder="如：高武世界、修仙文明、蒸汽朋克" oninput="updateExpandBtn()"></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">整体调性</label>
                                            <textarea class="form-control" rows="10" id="worldTone" placeholder="如：严肃、轻松、黑暗、光明" oninput="updateExpandBtn()"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div id="setting-overview" class="setting-section hidden">
                                    <div class="form-group">
                                        <textarea class="form-control" id="worldOverview" rows="10" placeholder="详细描述这个世界的背景、特征和核心设定（输入内容后可使用AI完善）" oninput="updateExpandBtn()"></textarea>
                                    </div>
                                </div>

                                <div id="setting-conflict" class="setting-section hidden">
                                    <div class="form-group">
                                        <textarea class="form-control" id="worldCoreConflict" rows="10" placeholder="这个世界的主要矛盾是什么？例如：人族与妖族的对立、正道与魔道的纷争、资源枯竭的危机..." oninput="updateExpandBtn()"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="card-section-actions">
                            <button class="btn-secondary" onclick="aiFillSetting()" id="expandSectionBtn">
                                <i class="fas fa-magic me-1"></i> AI 完善
                            </button>
                            <button class="btn-primary" onclick="saveSetting()">
                                <i class="fas fa-save me-1"></i> 保存设定
                            </button>
                        </div>
                    </div>
                </div>

                <div id="tab-foundation" class="tab-content hidden">
                    <div class="card-section card-section-with-actions">
                        <div class="d-flex gap-4 card-section-body">
                            <div class="section-sidebar">
                                <button class="section-nav-btn active" onclick="showFoundationSection('geography')">世界地理</button>
                                <button class="section-nav-btn" onclick="showFoundationSection('calendar')">时间历法</button>
                                <button class="section-nav-btn" onclick="showFoundationSection('rules')">天地规则</button>
                                <button class="section-nav-btn" onclick="showFoundationSection('balance')">平衡机制</button>
                            </div>

                            <div class="section-content flex-fill">
                                <h4 id="foundation-title" class="section-title">世界地理</h4>
                                <div id="foundation-geography" class="foundation-section">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">大陆分布</label>
                                            <textarea class="form-control" rows="10" id="foundationContinent" placeholder="描述世界的大陆、海洋、岛屿分布" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">特殊地形</label>
                                            <textarea class="form-control" rows="10" id="foundationTerrain" placeholder="山脉、森林、沙漠、秘境等特殊地理特征" ></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div id="foundation-calendar" class="foundation-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">纪年方式</label>
                                            <input type="text" class="form-control" id="foundationEra" placeholder="如：神武纪年" >
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">一年天数</label>
                                            <input type="text" class="form-control" id="foundationDays" placeholder="如：365天" >
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">季节划分</label>
                                            <input type="text" class="form-control" id="foundationSeasons" placeholder="如：春夏秋冬" >
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">特殊节气/节日</label>
                                        <textarea class="form-control" rows="6" id="foundationFestivals" placeholder="重要的节气、节日及其意义" ></textarea>
                                    </div>
                                </div>

                                <div id="foundation-rules" class="foundation-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">自然法则</label>
                                            <textarea class="form-control" rows="6" id="foundationLaws" placeholder="物理定律、元素规则等" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">世界边界</label>
                                            <textarea class="form-control" rows="6" id="foundationBoundary" placeholder="世界的边界、极限在哪里" ></textarea>
                                        </div>
                                    </div>

                                    <div class="mt-4 g-4 ">
                                        <label class="form-label">核心公理</label>
                                        <p class="text-muted small mb-2">公理是这个世界绝对不能打破的底层规则（如："魔法必须消耗能量"），后面的自动生成、一致性检查都会严格参考公理设定。</p>
                                        <div id="axiomsList">
                                            <input type="text" class="form-control mb-2" placeholder="核心规则 1" >
                                        </div>
                                        <div class="d-flex gap-2">
                                            <button class="btn-secondary btn-sm" onclick="addAxiom()">
                                                <i class="fas fa-plus me-1"></i> 新增一条
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <div id="foundation-balance" class="foundation-section hidden">
                                    <div class="form-group">
                                        <label class="form-label">平衡机制</label>
                                        <textarea class="form-control" rows="12" id="foundationBalance" placeholder="维持世界稳定的制衡力量、法则平衡等" ></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="card-section-actions">
                            <button class="btn-secondary" onclick="aiFillFoundation()" id="expandFoundationBtn">
                                <i class="fas fa-magic me-1"></i> AI 完善
                            </button>
                            <button class="btn-primary" onclick="saveFoundation()">
                                <i class="fas fa-save me-1"></i> 保存设定
                            </button>
                        </div>
                    </div>
                </div>

                <div id="tab-power" class="tab-content hidden">
                    <div class="card-section card-section-with-actions">
                        <div class="d-flex gap-4 card-section-body">
                            <div class="section-sidebar">
                                <button class="section-nav-btn active" onclick="showPowerSection('energy')">能量来源</button>
                                <button class="section-nav-btn" onclick="showPowerSection('level')">修炼等级</button>
                                <button class="section-nav-btn" onclick="showPowerSection('martial')">功法武学</button>
                                <button class="section-nav-btn" onclick="showPowerSection('treasure')">法宝丹药</button>
                                <button class="section-nav-btn" onclick="showPowerSection('beast')">妖兽神兽</button>
                            </div>

                            <div class="section-content flex-fill">
                                <h4 id="power-title" class="section-title">能量来源</h4>
                                <div id="power-energy" class="power-section">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">主要能量类型</label>
                                            <textarea class="form-control" rows="4" id="powerEnergyType" placeholder="如：灵气、魔力、斗气" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">能量分布</label>
                                            <textarea class="form-control" rows="4" id="powerEnergyDistribution" placeholder="如：山川灵脉、地火精华" ></textarea>
                                        </div>
                                    </div>
                                    <div class="form-group">
                                        <label class="form-label">能量特性</label>
                                        <textarea class="form-control" rows="6" id="powerEnergyTraits" placeholder="能量的属性、相生相克等" ></textarea>
                                    </div>
                                </div>

                                <div id="power-level" class="power-section hidden">
                                    <div class="form-group">
                                        <label class="form-label">修炼等级</label>
                                        <textarea class="form-control" rows="12" id="powerLevels" placeholder="列出修炼境界及其描述，如：炼气、筑基、金丹、元婴..." ></textarea>
                                    </div>
                                </div>

                                <div id="power-martial" class="power-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">功法分类</label>
                                            <textarea class="form-control" rows="10" id="powerMartialCategory" placeholder="如：内功心法、身法、剑法、秘术" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">传承方式</label>
                                            <textarea class="form-control" rows="10" id="powerMartialHeritage" placeholder="如何获取功法、传承条件" ></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div id="power-treasure" class="power-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">法宝分类</label>
                                            <textarea class="form-control" rows="10" id="powerTreasureCategory" placeholder="如：法器、灵宝、仙器、神器" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">丹药体系</label>
                                            <textarea class="form-control" rows="10" id="powerTreasurePill" placeholder="丹药等级、炼制方法等" ></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div id="power-beast" class="power-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">妖兽等级</label>
                                            <textarea class="form-control" rows="10" id="powerBeastLevel" placeholder="妖兽的实力划分" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">神兽传说</label>
                                            <textarea class="form-control" rows="10" id="powerBeastLegend" placeholder="传说中的神兽、圣兽" ></textarea>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="card-section-actions">
                            <button class="btn-secondary" onclick="aiFillPower()" id="expandPowerBtn">
                                <i class="fas fa-magic me-1"></i> AI 完善
                            </button>
                            <button class="btn-primary" onclick="savePower()">
                                <i class="fas fa-save me-1"></i> 保存设定
                            </button>
                        </div>
                    </div>
                </div>

                <div id="tab-races" class="tab-content hidden">
                    <div class="card-section card-section-with-actions">
                        <div class="d-flex gap-4 card-section-body">
                            <div class="section-sidebar">
                                <button class="section-nav-btn active" onclick="showRacesSection('category')">种族分类</button>
                                <button class="section-nav-btn" onclick="showRacesSection('value')">价值观</button>
                                <button class="section-nav-btn" onclick="showRacesSection('trait')">繁衍特性</button>
                                <button class="section-nav-btn" onclick="showRacesSection('relation')">族群关系</button>
                            </div>

                            <div class="section-content flex-fill">
                                <h4 id="races-title" class="section-title">种族分类</h4>
                                <div id="races-category" class="races-section">
                                    <div class="form-group">
                                        <textarea class="form-control" rows="12" id="racesCategory" placeholder="列出主要种族：人类、妖族、魔族、精灵、海族等" ></textarea>
                                    </div>
                                </div>

                                <div id="races-value" class="races-section hidden">
                                    <div class="form-group">
                                        <textarea class="form-control" rows="12" id="racesValue" placeholder="种族的核心价值观、处世哲学" ></textarea>
                                    </div>
                                </div>

                                <div id="races-trait" class="races-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">寿命</label>
                                            <textarea class="form-control" rows="6" id="racesLifespan" placeholder="如：人类百年、精灵千年" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">繁衍方式</label>
                                            <textarea class="form-control" rows="6" id="racesReproduction" placeholder="自然繁衍/特殊方式" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">特殊体质</label>
                                            <textarea class="form-control" rows="6" id="racesConstitution" placeholder="如：天生灵体、魔躯" ></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div id="races-relation" class="races-section hidden">
                                    <div class="form-group">
                                        <label class="form-label">族群关系</label>
                                        <textarea class="form-control" rows="12" id="racesRelation" placeholder="种族间的对立、融合、冲突历史" ></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="card-section-actions">
                            <button class="btn-secondary" onclick="aiFillRaces()" id="expandRacesBtn">
                                <i class="fas fa-magic me-1"></i> AI 完善
                            </button>
                            <button class="btn-primary" onclick="saveRaces()">
                                <i class="fas fa-save me-1"></i> 保存设定
                            </button>
                        </div>
                    </div>
                </div>

                <div id="tab-society" class="tab-content hidden">
                    <div class="card-section card-section-with-actions">
                        <div class="d-flex gap-4 card-section-body">
                            <div class="section-sidebar">
                                <button class="section-nav-btn active" onclick="showSocietySection('court')">朝堂皇权</button>
                                <button class="section-nav-btn" onclick="showSocietySection('sect')">宗门门派</button>
                                <button class="section-nav-btn" onclick="showSocietySection('martial')">江湖势力</button>
                                <button class="section-nav-btn" onclick="showSocietySection('external')">域外势力</button>
                                <button class="section-nav-btn" onclick="showSocietySection('class')">阶层划分</button>
                                <button class="section-nav-btn" onclick="showSocietySection('currency')">货币体系</button>
                                <button class="section-nav-btn" onclick="showSocietySection('resource')">核心资源</button>
                            </div>

                            <div class="section-content flex-fill">
                                <h4 id="society-title" class="section-title">朝廷势力</h4>
                                <div id="society-court" class="society-section">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">国家体制</label>
                                            <textarea class="form-control" rows="10" id="societyGovernment" placeholder="王朝、帝国、联邦等政治体制" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">官僚体系</label>
                                            <textarea class="form-control" rows="10" id="societyBureaucracy" placeholder="官职设置、权力结构" ></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div id="society-sect" class="society-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">门派等级</label>
                                            <textarea class="form-control" rows="10" id="societySectLevel" placeholder="如：大宗、名门、小派" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">传承关系</label>
                                            <textarea class="form-control" rows="10" id="societySectHeritage" placeholder="门派间的师承、联盟、敌对关系" ></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div id="society-martial" class="society-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">武林帮派</label>
                                            <textarea class="form-control" rows="10" id="societyMartialFaction" placeholder="各大帮派及其特点" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">商会联盟</label>
                                            <textarea class="form-control" rows="10" id="societyMartialGuild" placeholder="商业组织、地下势力" ></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div id="society-external" class="society-section hidden">
                                    <div class="form-group">
                                        <label class="form-label">域外势力</label>
                                        <textarea class="form-control" rows="12" id="societyExternal" placeholder="异界来客、上古传承、隐秘组织" ></textarea>
                                    </div>
                                </div>

                                <div id="society-class" class="society-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">社会等级</label>
                                            <textarea class="form-control" rows="10" id="societyClassLevel" placeholder="贵族、平民、奴隶等阶层" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">流动规则</label>
                                            <textarea class="form-control" rows="10" id="societyClassMobility" placeholder="阶层间的流动方式" ></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div id="society-currency" class="society-section hidden">
                                    <div class="overview-grid">
                                        <div class="form-group">
                                            <label class="form-label">货币类型</label>
                                            <textarea class="form-control" rows="10" id="societyCurrencyType" placeholder="如：金币、银币、铜币" ></textarea>
                                        </div>
                                        <div class="form-group">
                                            <label class="form-label">经济规则</label>

                <div id="tab-consistency" class="tab-content hidden" x-data="consistencyState()" x-init="window.consistencyStateInstance = $data">
                    <div class="dc-panel-container">
                        <h3 class="dc-panel-header">
                            <i class="fas fa-check-double"></i> 一致性检查
                        </h3>
                        <div class="d-flex gap-2 mb-3 dc-panel-actions">
                            <template x-if="state === 'empty' || state === 'noIssues'">
                                <button class="btn-primary" @click="checkConsistency()">
                                    <i class="fas fa-search me-1"></i> 检查一致性
                                </button>
                            </template>
                            <template x-if="state === 'hasIssues'">
                                <div class="d-flex gap-2">
                                    <button class="btn-primary" @click="checkConsistency()">
                                        <i class="fas fa-search me-1"></i> 检查一致性
                                    </button>
                                    <button class="btn-accent" @click="fixConsistency()">
                                        <i class="fas fa-wand-magic-sparkles me-1"></i> AI 修复
                                    </button>
                                </div>
                            </template>
                            <template x-if="state === 'hasSuggestions'">
                                <div class="d-flex gap-2">
                                    <button class="btn-secondary" @click="resetState()">
                                        <i class="fas fa-times me-1"></i> 清除建议
                                    </button>
                                    <button class="btn-primary" @click="applyConsistencyChanges()">
                                        <i class="fas fa-check me-1"></i> 应用选中的修改
                                    </button>
                                </div>
                            </template>
                        </div>
                        <div class="dc-panel-content">
                            <!-- 初始状态 -->
                            <div x-show="state === 'empty'" class="border rounded p-4 dc-report-box">
                                <p class="text-muted mb-0">点击上方按钮检查设定一致性</p>
                            </div>
                            
                            <!-- 无问题状态 -->
                            <div x-show="state === 'noIssues'">
                                <div style="text-align: center; padding: 20px 0;">
                                    <span style="font-size: 32px; color: #22c55e;">✓</span>
                                    <p style="color: #e8b840; font-size: 16px; margin: 8px 0 0 0;">设定之间逻辑自洽，未发现矛盾，继续加油！</p>
                                </div>
                            </div>
                            
                            <!-- 问题列表 -->
                            <div x-show="state === 'hasIssues'">
                                <template x-for="(issue, index) in issues" :key="index">
                                    <div class="consistency-card" style="border: 1px solid #374151; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px;">
                                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 12px;">
                                            <div style="font-size: 16px; line-height: 1.6; flex: 1; word-break: break-word;">
                                                <strong x-text="(index + 1) + '. ' + issue.message"></strong>
                                            </div>
                                            <span style="display: inline-block; padding: 4px 10px; border-radius: 9999px; font-size: 14px; font-weight: 600; flex-shrink: 0; white-space: nowrap;"
                                                  :style="{ background: issue.severity === 'error' ? 'rgba(239, 68, 68, 0.2)' : 'rgba(234, 179, 8, 0.2)', color: issue.severity === 'error' ? '#f87171' : '#fbbf24' }"
                                                  x-text="issue.severity === 'error' ? '严重' : '警告'"></span>
                                        </div>
                                        <p style="color: #d1d5db; font-size: 15px; margin: 0 0 8px 0; line-height: 1.8;" x-text="issue.detail"></p>
                                        <p style="color: #9ca3af; font-size: 14px; margin: 0 0 8px 0;">
                                            目标层级: <span style="color: #d1d5db;" x-text="getLayerName(issue.targetLayer)"></span>
                                            <span x-show="issue.targetField"> / </span>
                                            <code x-show="issue.targetField" style="font-family: monospace; color: #a78bfa; font-size: 13px;" x-text="translateFieldPath(issue.targetField)"></code>
                                        </p>
                                        <textarea class="consistency-note" rows="3" style="width: 100%; background: #1f2937; color: #f3f4f6; border: 1px solid #374151; border-radius: 4px; padding: 8px 10px; font-size: 15px; line-height: 1.7; resize: vertical; box-sizing: border-box;" placeholder="输入你期望的修复方向...（可选）"
                                                  :id="'consistency-fix-note-' + index"></textarea>
                                    </div>
                                </template>
                            </div>
                            
                            <!-- 修复建议 -->
                            <div x-show="state === 'hasSuggestions'">
                                <div class="border rounded p-4">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <h4>修改建议</h4>
                                        <div class="d-flex gap-2">
                                            <button class="btn btn-sm btn-outline-secondary" @click="selectAllSuggestions(true)">
                                                <i class="fas fa-check-square me-1"></i>全选
                                            </button>
                                            <button class="btn btn-sm btn-outline-secondary" @click="selectAllSuggestions(false)">
                                                <i class="fas fa-square me-1"></i>取消全选
                                            </button>
                                        </div>
                                    </div>
                                    <div>
                                        <template x-for="(suggestion, index) in suggestions" :key="index">
                                            <div class="suggestion-item" :data-index="index">
                                                <div class="d-flex justify-content-between align-items-start mb-2">
                                                    <div class="d-flex align-items-center gap-2">
                                                        <input type="checkbox" class="suggestion-checkbox" :checked="suggestion.selected" @change="toggleSuggestion(index)">
                                                        <span class="font-medium" x-text="'修改 ' + (index + 1)"></span>
                                                    </div>
                                                    <span class="suggestion-impact" x-text="getImpactText(suggestion.impact)"></span>
                                                </div>
                                                <div class="suggestion-content">
                                                    <p class="text-sm text-muted mb-1">
                                                        <strong>目标:</strong> <span class="text-primary" x-text="getLayerName(suggestion.targetLayer)"></span> / <code class="text-sm" x-text="translateFieldPath(suggestion.targetField)"></code>
                                                    </p>
                                                    <div class="suggestion-section">
                                                        <p class="text-sm mb-1"><strong>原值:</strong></p>
                                                        <div class="suggestion-old-value" x-html="formatValue(suggestion.oldValue)"></div>
                                                    </div>
                                                    <div class="suggestion-section">
                                                        <p class="text-sm mb-1"><strong>新值:</strong></p>
                                                        <textarea class="suggestion-edit" :data-index="index" data-field="newValue" style="width: 100%; background: #1f2937; color: #f3f4f6; border: 1px solid #374151; border-radius: 4px; padding: 8px; font-size: 14px; resize: vertical;"
                                                                  x-model="suggestion.newValue"></textarea>
                                                    </div>
                                                    <div class="suggestion-section">
                                                        <p class="text-sm mb-1"><strong>原因:</strong></p>
                                                        <div class="suggestion-reason" x-text="suggestion.reason"></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </div>
